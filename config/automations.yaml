- id: '1770672665674'
  alias: Alarmo og Homey Boolean - Toveis synkronisering
  description: ''
  triggers:
  - entity_id: input_boolean.alarm_til_homey
    id: boolean_changed
    trigger: state
  - entity_id: alarm_control_panel.alarm
    to:
    - armed_away
    - armed_home
    - armed_night
    - armed_vacation
    id: alarmo_armed
    trigger: state
  - entity_id: alarm_control_panel.alarm
    to: disarmed
    id: alarmo_disarmed
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
