        - Tilstand: {{ state_attr(''weather.forecast_home'', ''condition'') }} - Luftfuktighet:
        {{ state_attr(''weather.forecast_home'', ''humidity'') }}% - Vind: {{ state_attr(''weather.forecast_home'',
        ''wind_speed'') }} m/s

        Prognose: - Temperatur min: {{ weather_data[''weather.forecast_home''].forecast[0].temperature
        }}°C - Temperatur maks: {{ weather_data[''weather.forecast_home''].forecast[0].templow
        }}°C - Nedbør sannsynlighet: {{ weather_data[''weather.forecast_home''].forecast[0].precipitation
