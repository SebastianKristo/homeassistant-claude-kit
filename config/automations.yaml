- id: '1743270001000'
  alias: 'Varsel: Vindu åpent og kaldt ute'
  description: 'Varsler når vindu har stått åpent i 15 minutter og utetemperaturen
    er under 5°C.

    '
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.cybele_soverom_vindu
    - binary_sensor.rune_kontor_vindu
    to: 'on'
    for:
      minutes: 15
  conditions:
  - condition: numeric_state
    entity_id: sensor.vaervarsel_temperatur
    below: 5
  actions:
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: "\U0001FA9F Vindu åpent – kaldt ute"
      message: '{{ trigger.to_state.attributes.friendly_name }} har vært åpent i 15
        min. Utetemperatur: {{ states(''sensor.vaervarsel_temperatur'') | round(1)
        }}°C.

        '
  mode: parallel
  max: 3
- id: '1743270002000'
  alias: 'Varsel: Lav batteri – daglig sjekk kl 09:00'
  description: 'Sjekker alle batterisensorer kl 09:00 og varsler om noen er under
    15%.

    '
  triggers:
  - trigger: time
    at: 09:00:00
  conditions:
  - condition: template
    value_template: "{% set ns = namespace(found=false) %} {% for s in states %}\n
      \ {% if s.attributes.get('device_class') == 'battery'\n        and s.state not
      in ['unavailable', 'unknown', '']\n        and s.state | float(100) < 15 %}\n
      \   {% set ns.found = true %}\n  {% endif %}\n{% endfor %} {{ ns.found }}\n"
  actions:
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: "\U0001F50B Lav batteri"
      message: "{% set ns = namespace(items=[]) %} {% for s in states %}\n  {% if
        s.attributes.get('device_class') == 'battery'\n        and s.state not in
        ['unavailable', 'unknown', '']\n        and s.state | float(100) < 15 %}\n
        \   {% set ns.items = ns.items + [s.attributes.get('friendly_name', s.entity_id)
        ~ ': ' ~ s.state ~ '%'] %}\n  {% endif %}\n{% endfor %} {{ ns.items | join('\\n')
        }}\n"
  mode: single
- id: '1743270003000'
  alias: 'Markise: Trekk inn ved kraftig vind eller regn'
  description: 'Lukker markisen automatisk når vinden overstiger 10 m/s eller det
    er regn/storm. Kjører hvert 15. minutt.

    '
  triggers:
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: cover.markise
      state: closed
  - condition: template
    value_template: "{{ state_attr('weather.forecast_home', 'wind_speed') | float(0)
      > 10\n   or states('weather.forecast_home') in\n      ['rainy', 'pouring', 'lightning',
      'lightning-rainy', 'hail'] }}\n"
  actions:
  - action: cover.close_cover
    target:
      entity_id: cover.markise
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: ⛱️ Markise lukket automatisk
      message: 'Vær: {{ states(''weather.forecast_home'') }}. Vind: {{ state_attr(''weather.forecast_home'',
        ''wind_speed'') | round(0) }} m/s.

        '
  mode: single
