- id: '1764524642137'
  alias: Morgengry Automasjon - Vekkealarm Lys
  description: Skrur på lys gradvis ved vekkealarm og slår av etter 30 min
  triggers:
  - at: input_datetime.sebastian_vekkealarm
    trigger: time
  conditions:
  - condition: state
    entity_id: switch.sebastian_posisjon_hjemme_borte
    state: 'on'
  actions:
  - data:
      brightness_pct: 0
    target:
      entity_id:
      - light.pultlampe
      - light.nattlampe
      - light.pultskjermer
    action: light.turn_on
  - data:
      brightness_pct: 100
      transition: '{{ states(''input_number.soverom_morgengry_minutter'') | int *
        60 }}'
    target:
      entity_id:
      - light.pultlampe
      - light.nattlampe
      - light.pultskjermer
    action: light.turn_on
  - delay:
      hours: 0
      minutes: 30
      seconds: 0
      milliseconds: 0
  - target:
      entity_id:
      - light.pultlampe
      - light.nattlampe
      - light.pultskjermer
    data: {}
    action: light.turn_off
  mode: single
