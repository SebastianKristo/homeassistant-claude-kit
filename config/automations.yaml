          - automation.auto_aktiver_sommermodus
          - automation.auto_deaktiver_sommermodus
          - automation.effekt_gi_plass_til_matlaging
          - automation.effekt_gjenopprett_varme_etter_reduksjon
          - automation.effekt_smart_reduksjon_ved_kritisk_niva
          - automation.effektadvarsel_naermer_seg_grense
          - automation.effekt_kveldsikring_16_00_19_00
          - automation.effekt_morgensikring_06_00_09_00
          - automation.effektleddsbeskyttelse
