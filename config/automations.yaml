      - condition: state
        entity_id: input_boolean.alarm_til_homey
        state: 'on'
      sequence:
      - data:
          entity_id: alarm_control_panel.alarm
          mode: armed_away
        action: alarmo.arm
    - conditions:
      - condition: trigger
