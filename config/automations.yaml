        value_template: "{{ (trigger.to_state.state == 'Borte' and is_state('input_boolean.klimastyring_helg_manuell',
          'off')) or\n   (trigger.to_state.state == 'Komfort' and is_state('input_boolean.klimastyring_helg_manuell',
          'on')) }}\n"
