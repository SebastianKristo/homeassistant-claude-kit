      raw_today: '{{ state_attr(''sensor.nordpool_kwh_no1_nok_3_10_025'', ''raw_today'')
        }}'
      raw_tomorrow: '{{ state_attr(''sensor.nordpool_kwh_no1_nok_3_10_025'', ''raw_tomorrow'')
        }}'
  - variables:
      price_prompt: 'Du er en energirådgiver som hjelper folk spare penger på strøm.
        Analyser følgende strømpriser for Norge (NO1) og gi konkrete anbefalinger
        på norsk.

        DAGENS STRØMPRISER (i øre/kWh): - Nåværende pris: {{ current_price }} øre
        - Gjennomsnitt i dag: {{ today_avg }} øre - Laveste i dag: {{ today_min }}
        øre - Høyeste i dag: {{ today_max }} øre

        {% if tomorrow_valid %} MORGENDAGENS STRØMPRISER (i øre/kWh): - Gjennomsnitt
        i morgen: {{ tomorrow_avg }} øre - Laveste i morgen: {{ tomorrow_min }} øre
        - Høyeste i morgen: {{ tomorrow_max }} øre {% else %} MORGENDAGENS PRISER:
        Ikke tilgjengelig ennå (oppdateres ca kl 13:00) {% endif %}

        TIMEPRISER I DAG: {{ raw_today }}

        {% if tomorrow_valid %} TIMEPRISER I MORGEN: {{ raw_tomorrow }} {% endif %}

        OPPGAVE: Gi en kort, klar anbefaling (2-3 setninger):

        - Start anbefalingen med enten "✅ Start vaskemaskinen I DAG" eller "⏳ VENT
        med å vaske" - Hvis i dag: Si nøyaktig når på dagen (klokkeslett) jeg bør
        starte - mellom kl 08:00 og 22:00 - Hvis vente: Si når jeg bør vaske i stedet
        (i morgen og klokkeslett) - mellom kl 08:00 og 22:00 - Nevn prisen på beste
        tidspunkt - VIKTIG: Foreslå KUN tidspunkt mellom kl 08:00 og 22:00

        Anta at en vask bruker ca 1 kWh. Vær konkret og direkte.

        '
  - data:
      prompt: '{{ price_prompt }}'
    response_variable: gemini_response
    action: google_generative_ai_conversation.generate_content
  - data:
      title: '⚡ Strømpris: Skal du vaske i dag?'
      message: '{{ gemini_response.text }}'
      data:
        ttl: 0
        priority: high
        notification_icon: mdi:washing-machine
    action: notify.mobile_app_sebastian_oneplus_15
  mode: single
- id: '1764524696539'
  alias: Daglig værmelding med Gemini AI
  description: Sender værmelding hver morgen kl 07:00 med Gemini AI-generert tekst
  triggers:
