        - automation.effektleddsbeskyttelse
        - automation.handling_aktiver_helgemodus
        - automation.handling_bli_hjemme
        - automation.handling_fortsatt_borte
        - automation.handling_kom_hjem
        - automation.temperaturkontroll_cybele_soverom
        - automation.temperaturkontroll_gulvvarme_kjokken
        - automation.temperaturkontroll_gulvvarme_bad
        - automation.temperaturkontroll_panelovner_generell
        - automation.varsling_kommer_du_hjem
        - automation.varsling_drar_du_bort_i_helgen
        - automation.temperaturkontroll_sebastian_soverom
        - automation.smart_varmestyring_rotasjon_med_prioritet
      data:
        stop_actions: true
    else:
    - if:
      - condition: state
