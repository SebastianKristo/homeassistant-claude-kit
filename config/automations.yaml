- id: vann_sesjon_slutt
  alias: Vann — legg til forbruk ved aktivitetsslutt
  description: 'Når en vannaktivitet er ferdig, beregnes forbruket (L) og legges til
    den aktuelle dagsteller basert på hvilken kategori som var aktiv.

    '
  triggers:
  - trigger: state
    entity_id: sensor.vann_aktivitet_kategori
    to: Ingen aktivitet
  actions:
  - variables:
      sesjon_l: "{{ [states('sensor.vannmaler_total_volume') | float(0)\n   - states('input_number.vann_session_start')
        | float(0), 0] | max | round(1) }}\n"
      kategori: '{{ trigger.from_state.state }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ kategori == ''Dusj'' }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.vann_dusj_daglig
        data:
          value: '{{ (states(''input_number.vann_dusj_daglig'') | float(0) + sesjon_l)
            | round(1) }}'
    - conditions:
      - condition: template
        value_template: '{{ kategori == ''Toalett'' }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.vann_toalett_daglig
        data:
          value: '{{ (states(''input_number.vann_toalett_daglig'') | float(0) + sesjon_l)
            | round(1) }}'
    - conditions:
      - condition: template
        value_template: '{{ kategori == ''Handvask'' }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.vann_handvask_daglig
        data:
          value: '{{ (states(''input_number.vann_handvask_daglig'') | float(0) + sesjon_l)
            | round(1) }}'
    - conditions:
      - condition: template
        value_template: '{{ kategori in [''Oppvask (varm)'', ''Vask / oppvask''] }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.vann_oppvask_daglig
        data:
          value: '{{ (states(''input_number.vann_oppvask_daglig'') | float(0) + sesjon_l)
            | round(1) }}'
    - conditions:
      - condition: template
        value_template: '{{ kategori == ''Badekar'' }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.vann_badekar_daglig
        data:
          value: '{{ (states(''input_number.vann_badekar_daglig'') | float(0) + sesjon_l)
            | round(1) }}'
  mode: queued
  max: 5
- id: vann_kategori_reset_daglig
  alias: Vann — nullstill kategoritellere ved midnatt
  description: Nullstiller alle daglige vannkategori-tellere klokken 00:00.
  triggers:
  - trigger: time
    at: 00:00:00
  actions:
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_session_start
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_dusj_daglig
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_toalett_daglig
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_handvask_daglig
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_oppvask_daglig
    data:
      value: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.vann_badekar_daglig
    data:
      value: 0
  mode: single
- id: ringeklokke_varsel_sett_paa
  alias: Ringeklokke — vis varsel i dashboard
  description: Setter input_boolean.ringeklokke_varsel når noen ringer på døren.
  triggers:
  - trigger: state
    entity_id: event.g4_doorbell_pro_doorbell
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.ringeklokke_varsel
  - delay:
      minutes: 5
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.ringeklokke_varsel
  mode: restart
- id: ringeklokke_varsel_reset
  alias: Ringeklokke — nullstill varsel manuelt (via dashboard)
  description: Lytter på turn_off-kall fra dismiss-knappen i dashbordet.
  triggers:
  - trigger: state
    entity_id: input_boolean.ringeklokke_varsel
    to: 'off'
  actions: []
  mode: single
