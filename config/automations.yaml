- id: '1764448703440'
  alias: VVB. LegionellaFeil
  description: ''
  triggers:
  - at: input_datetime.vvb_heater_legioniella
    trigger: time
  actions:
  - entity_id: input_number.antall_billig_timer_natt_backup
    data_template:
      value: '{{ states(''input_number.vvb_billigste_timer_dogn'') }}'
    action: input_number.set_value
  - entity_id: input_number.vvb_billigste_timer_dogn
    data_template:
      value: '{{ states(''input_number.vvb_billigste_timer_dogn'')|int + 3|int}}'
    action: input_number.set_value
  - data:
      message: Varmtvannsberederen har ikke oppnådd temperaturen sin på 3 dager. Berederen
        varmes helt opp neste gang
      title: Varmtvann Legionella
    action: persistent_notification.create
  - action: notify.mobile_app_sebastian_oneplus_15
    metadata: {}
    data:
      message: Varmtvannsberederen har ikke oppnådd temperaturen sin på 3 dager. Berederen
        varmes helt opp neste gang
      title: Varmtvann Legionella
  - action: notify.mobile_app_sebastian_iphone_17_pro
    metadata: {}
    data:
      message: Varmtvannsberederen har ikke oppnådd temperaturen sin på 3 dager. Berederen
        varmes helt opp neste gang
      title: Varmtvann Legionella
- id: '1764448717902'
  alias: VVB. LegionellaOK
  description: Registrerer fullført legionellaoppvarming og planlegger neste
  triggers:
  - trigger: numeric_state
    entity_id: sensor.varmtvannsbereder_effekt
    below: 10
    for:
      minutes: 2
  conditions:
  - condition: state
    entity_id: switch.varmtvannsbereder
    state: 'on'
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.vvb_heater_legioniella
    data:
      datetime: '{{ now() + timedelta(days=3) }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.vvb_heater_completed
    data:
      datetime: '{{ now() }}'
  - condition: state
    entity_id: binary_sensor.VVB_legionella_OK
    state: 'off'
  - action: input_number.set_value
    target:
      entity_id: input_number.vvb_billigste_timer_dogn
    data:
      value: '{{ states(''input_number.antall_billig_timer_natt_backup'') }}'
