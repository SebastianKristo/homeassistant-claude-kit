- id: '1765225893309'
  alias: Kitchen Washing Machine Status
  description: ''
  triggers:
  - entity_id:
    - sensor.vaskemaskin_effekt
    id: idle
    below: 1
    above: 0
    trigger: numeric_state
  - entity_id:
    - sensor.vaskemaskin_effekt
    id: running
    above: 2
    for:
      hours: 0
      minutes: 0
      seconds: 10
    trigger: numeric_state
  - entity_id:
    - sensor.vaskemaskin_effekt
    id: 'off'
    to: '0'
    for:
      hours: 0
      minutes: 0
      seconds: 10
    trigger: state
  - entity_id: input_boolean.chores_laundry
    id: off laundry
    from: 'on'
    to: 'off'
    trigger: state
  - entity_id:
    - sensor.vaskemaskin_effekt
    id: scheduled
    to: '1'
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: idle
      - condition: state
        entity_id: input_select.washing_machine_status
        state: 'Off'
      sequence:
      - target:
          entity_id: input_select.washing_machine_status
        data:
          option: Idle
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: running
      - condition: or
        conditions:
        - condition: state
          entity_id: input_select.washing_machine_status
          state: 'Off'
        - condition: state
          entity_id: input_select.washing_machine_status
          state: Idle
        - condition: state
          entity_id: input_select.washing_machine_status
          state: Clean
      sequence:
      - target:
          entity_id: input_select.washing_machine_status
        data:
          option: Running
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_select.washing_machine_status
            state: Idle
          sequence:
          - target:
              entity_id: input_select.washing_machine_status
            data:
              option: 'Off'
            action: input_select.select_option
        - conditions:
          - condition: state
            entity_id: input_select.washing_machine_status
            state: Running
          sequence:
          - target:
              entity_id: input_select.washing_machine_status
            data:
              option: Clean
            action: input_select.select_option
          - target:
              entity_id: input_boolean.chores_laundry
            data: {}
            action: input_boolean.turn_on
        default: []
    - conditions:
      - condition: trigger
        id: off laundry
      - condition: not
        conditions:
        - condition: state
          entity_id: input_select.washing_machine_status
          state: Running
      sequence:
      - target:
          entity_id: input_select.washing_machine_status
        data:
          option: 'Off'
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id:
        - scheduled
      sequence:
      - target:
          entity_id: input_select.washing_machine_status
        data:
          option: Idle
        action: input_select.select_option
    default: []
  mode: single
