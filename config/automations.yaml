- id: '1743270006000'
  alias: 'Strøm: Varsle om ekstra billig pris'
  description: 'Varsler når strømprisen faller under 30 øre/kWh. Godt tidspunkt for
    oppvaskmaskin, vaskemaskin og EV-lading.

    '
  triggers:
  - trigger: numeric_state
    entity_id: sensor.nordpool_kwh_no1_nok_3_10_025
    below: 30
  conditions:
  - condition: template
    value_template: '{{ (now() - states.sensor.nordpool_kwh_no1_nok_3_10_025.last_changed).total_seconds()
      > 3600 }}

      '
  actions:
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: "\U0001F49A Billig strøm nå"
      message: '{{ states(''sensor.nordpool_kwh_no1_nok_3_10_025'') | float | round(1)
        }} øre/kWh. Kjør oppvaskmaskin, vaskemaskin eller lad elbil nå.

        '
  mode: single
- id: '1743270007000'
  alias: 'Varsel: Fryseskap uten strøm i 30 minutter'
  description: 'Varsler hvis fryseskapet ikke trekker noe strøm på 30 minutter. Kan
    bety strømsvikt, plugget ut, eller kompresorsvikt.

    '
  triggers:
  - trigger: numeric_state
    entity_id: sensor.fryseskap_effekt
    below: 5
    for:
      minutes: 30
  actions:
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: '❄️ ADVARSEL: Fryseskap uten strøm'
      message: 'Fryseskapet har ikke trukket strøm på 30+ minutter (nå: {{ states(''sensor.fryseskap_effekt'')
        | round(0) }} W). Sjekk at det er plugget inn!

        '
  - action: notify.mobile_app_rune_iphone_13
    data:
      title: '❄️ ADVARSEL: Fryseskap uten strøm'
      message: 'Fryseskapet har ikke trukket strøm på 30+ minutter. Sjekk at det er
        plugget inn!

        '
  mode: single
- id: '1743270008000'
  alias: 'Varsel: Inngangsdør ulåst etter kl 22:00'
  description: 'Varsler hvis inngangsdøren fortsatt er ulåst 10 minutter etter kl
    22:00.

    '
  triggers:
  - trigger: state
    entity_id: lock.dorlas
    to: unlocked
    for:
      minutes: 10
  conditions:
  - condition: time
    after: '22:00:00'
    before: 07:00:00
  - condition: state
    entity_id: input_boolean.night_mode
    state: 'on'
  actions:
  - action: notify.mobile_app_sebastian_iphone_17_pro
    data:
      title: "\U0001F513 Dør ulåst om natten"
      message: Inngangsdøren har vært ulåst i over 10 minutter. Lås den?
  mode: single
- id: '1743270009000'
  alias: 'Velkomst: Tenn lys når noen kommer hjem i mørket'
  description: 'Slår på inngangs- og stuelys med varmt lys når en person ankommer
    hjemmet etter solnedgang.

    '
  triggers:
  - trigger: state
    entity_id:
    - person.sebastian_kristo_jemtland
    - person.rune_jemtland
    - person.cybele_kristo
    to: home
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: light.inngang_lys
    state: 'off'
  actions:
  - action: light.turn_on
