- id: '1767271733214'
  alias: Oppdater Effekttopper
  description: 'Registrerer kWh forbrukt siste time. Kjører kun på hverdager kl 07-22
    (fanger timene 06-21). Kilde: strommaler_time_peak (utility_meter, hourly). kWh/time
    = gjennomsnitt kW = grunnlag for effektledd (Elvia-regler).

    '
  triggers:
  - trigger: time_pattern
    minutes: '0'
    seconds: '30'
  conditions:
  - condition: template
    value_template: '{{ now().isoweekday() <= 5 and 6 < now().hour <= 22 }}'
  actions:
  - variables:
      time_kwh: '{{ state_attr(''sensor.strommaler_time_peak'', ''last_period'') |
        float(0) }}'
      t1: '{{ states(''input_number.effekt_topp_1'') | float(0) }}'
      t2: '{{ states(''input_number.effekt_topp_2'') | float(0) }}'
      t3: '{{ states(''input_number.effekt_topp_3'') | float(0) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ time_kwh > t1 }}'
      sequence:
      - target:
          entity_id: input_number.effekt_topp_3
        data:
          value: '{{ t2 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.effekt_topp_2
        data:
          value: '{{ t1 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.effekt_topp_1
        data:
          value: '{{ time_kwh }}'
        action: input_number.set_value
    - conditions:
      - condition: template
        value_template: '{{ time_kwh > t2 }}'
      sequence:
      - target:
          entity_id: input_number.effekt_topp_3
        data:
          value: '{{ t2 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.effekt_topp_2
        data:
          value: '{{ time_kwh }}'
        action: input_number.set_value
    - conditions:
      - condition: template
        value_template: '{{ time_kwh > t3 }}'
      sequence:
      - target:
          entity_id: input_number.effekt_topp_3
        data:
          value: '{{ time_kwh }}'
        action: input_number.set_value
  mode: single
