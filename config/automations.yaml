- id: vanning_kjokken_planlagt
  alias: 'Vanning: Kjøkken planlagt'
  description: Åpner kjøkkenventilen på planlagt tid
  triggers:
  - trigger: time
    at: input_datetime.vanning_kjokken_starttid
  conditions:
  - condition: state
    entity_id: input_boolean.vanning_aktivert
    state: 'on'
  - condition: template
    value_template: "{% set weekday = now().weekday() %} {% set days = [\n  'input_boolean.vanning_kjokken_man',\n
      \ 'input_boolean.vanning_kjokken_tir',\n  'input_boolean.vanning_kjokken_ons',\n
      \ 'input_boolean.vanning_kjokken_tor',\n  'input_boolean.vanning_kjokken_fre',\n
      \ 'input_boolean.vanning_kjokken_lor',\n  'input_boolean.vanning_kjokken_son'\n]
      %} {{ is_state(days[weekday], 'on') }}\n"
  - condition: template
    value_template: "{% if is_state('input_boolean.vanning_regnskjerm', 'on') %}\n
      \ {{ (states('sensor.vaervarsel_regn_neste_6_timer') | float(0))\n     < (states('input_number.vanning_regn_terskel')
      | float(2)) }}\n{% else %}\n  true\n{% endif %}\n"
  actions:
  - action: script.vanning_start
    data:
      ventil: valve.kjokken_vannventil_aktivert
      timer: timer.vanning_kjokken
      varighet: '{{ states(''input_number.vanning_kjokken_varighet'') | int(10) }}'
  mode: single
