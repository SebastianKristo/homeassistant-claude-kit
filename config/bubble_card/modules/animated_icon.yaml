animated_icon:
    name: "Animated Icon"
    version: "1.0.1"
    creator: "ozumado"
    link: "https://github.com/Clooos/Bubble-Card/discussions/1668"

    supported:
        - button
        - climate
        - cover
        - media-player

    description: |
    code: |
      ${(() => {
      
        const moduleConfig = this.config?.animated_icon;
      
        if (!moduleConfig || !moduleConfig.mode) return;
        
        const iconItem = card.querySelector('.bubble-main-icon');
        const parent = iconItem?.parentNode;
        parent.querySelectorAll(':scope > [class^="clone-"]:not(.clone-'+moduleConfig.mode+')').forEach(el => el.remove());
        
        const animations = {
          washing_machine: animatedWashingMachine,
          fan: animatedFan,
          boil: animatedBoil,
          dryer: animatedDryer,
          dishwasher: animatedDishwasher,
          heat_pump: animatedHeatPump,
          air_purifier: animatedAirPurifier,
          microwave: animatedMicrowave,
          alert: animatedAlert,
          alarm: animatedAlarm,
          ding: animatedDing,
          motion: animatedMotion,
          vacuum: animatedVacuum
        };
      
        return animations[moduleConfig.mode]?.();
      
        function animatedBoil() {
      
          icon.icon = "mdi:kettle-steam";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: boil 600ms linear infinite;' : ''};
            }
            
            @keyframes boil {
              0%, 100% { transform: translate(1.5px, -1.0px) rotate(-6deg); }
              10% { transform: translate(-1.9px, 1.1px) rotate(4deg);
                    clip-path: polygon(0 0, 66% 10%, 67% 30%, 88% 52%, 100% 100%, 0 100%); }
              20% { transform: translate(0.8px, 2.3px) rotate(9deg); }
              30% { transform: translate(-1.4px, -1.6px) rotate(-3deg); }
              40% { transform: translate(0.2px, 1.5px) rotate(6deg); }
              50% { transform: translate(-2.4px, 0.5px) rotate(0deg); }
              60% { transform: translate(2.0px, -1.1px) rotate(-8deg); }
              70% { transform: translate(-0.9px, 1.8px) rotate(5deg); }
              80% { transform: translate(0.4px, -1.4px) rotate(-4deg); }
              90% { transform: translate(-0.6px, 0.9px) rotate(1deg); }
            }
            
          `;
          
        }
        
        function animatedAirPurifier() {
      
          icon.icon = "mdi:air-purifier";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: air 1s linear infinite;' : ''};
            }
            
            @keyframes air {
              0%, 100% { clip-path: inset(0 0 0 0); }
              25% { clip-path: polygon(100% 100%, 0 100%, 0 0, 100% 0, 98% 32%, 63% 42%, 65% 58%, 100% 43%); }
              75% { clip-path: polygon(100% 100%, 0 100%, 0 0, 100% 0, 100% 44%, 64% 61%, 64% 73%, 100% 72%); }
              50% { clip-path: polygon(100% 100%, 0 100%, 0 0, 100% 0, 78% 38%, 64% 43%, 64% 72%, 100% 73%); }
            }
            
          `;
          
        }
        
        function animatedMicrowave() {
      
          icon.icon = "mdi:microwave";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:before {
              content: "";
              position: absolute;
              width: 55%;
              height: 45%;
              top: 28%;
              left: 15%;
              background: var(--bubble-icon-color, var(--bubble-button-background-color));
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: cook 1.5s linear infinite;' : ''};
            }
            
            @keyframes cook {
              0%, 100% { opacity: 20%; }
              50%      { opacity: 60%; }
            }
            
          `;
          
        }
        
        function animatedAlert() {
      
          icon.icon = "mdi:alarm-light";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: alert 0.75s linear infinite, shake 0.5s linear infinite;' : ''};
            }
            
            @keyframes alert {
              50% { clip-path: polygon(0% 55%, 25% 55%, 25% 35%, 35% 25%, 50% 18%, 65% 20%, 75% 35%, 75% 55%, 100% 55%, 100% 100%, 0 100%);}
            }
        
            @keyframes shake {
              0%, 100% { transform: translate(0, 0) rotate(0); }
              20%  { transform: translate(0.4px, -0.4px) rotate(-4deg); }
              40%  { transform: translate(-0.4px, 0.4px) rotate(4deg); }
              60%  { transform: translate(0.4px, 0.4px) rotate(-4deg); }
              80%  { transform: translate(-0.4px, -0.4px) rotate(4deg); }
            }
            
          `;
          
        }
        
        function animatedAlarm() {
      
          icon.icon = "mdi:alarm";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: alarm 0.75s ease infinite;' : ''};
            }
            
            @keyframes alarm {
              0%, 80%, 100% { transform: translateY(0); }
              10% { transform: translateY(-2px) rotate(-27deg); }
              20% { transform: translateY(-2px) rotate(21deg); }
              30% { transform: translateY(-2px) rotate(-15deg); }
              40% { transform: translateY(-2px) rotate(9deg); }
              50% { transform: translateY(0); }
              60% { transform: translateY(-1.2px) }
            }
            
          `;
          
        }
        
        function animatedDing() {
      
          icon.icon = "mdi:bell-ring";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: ring 4s linear infinite;' : ''};
              transform-origin: 50% 15%;
            }
            
            @keyframes ring {
              0% { transform: rotate(0); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              2% { transform: rotate(30deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              6% { transform: rotate(-28deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              10% { transform: rotate(34deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              14% { transform: rotate(-32deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              18% { transform: rotate(30deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              22% { transform: rotate(-28deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              26% { transform: rotate(26deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              30% { transform: rotate(-24deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              34% { transform: rotate(22deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              38% { transform: rotate(-20deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              42% { transform: rotate(18deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              46% { transform: rotate(-16deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              50% { transform: rotate(14deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              54% { transform: rotate(-12deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              58% { transform: rotate(10deg); clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
              62% { transform: rotate(-8deg); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
              66% { transform: rotate(6deg); }
              70% { transform: rotate(-4deg); }
              74% { transform: rotate(2deg); }
              78% { transform: rotate(-1deg); }
              82% { transform: rotate(1deg); }
              86% { transform: rotate(0); }
              100% { transform: rotate(0); clip-path: polygon(0 50%, 0 100%, 100% 100%, 100% 50%, 85% 50%, 80% 30%, 60% 5%, 40% 5%, 20% 30%, 15% 50%); }
            }
            
          `;
          
        }
        
        function animatedMotion() {
      
          icon.icon = "mdi:motion-sensor";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: clip 1.5s linear infinite;' : ''};
            }
            
            @keyframes clip {
              50% { clip-path: polygon(0 0, 55% 0, 100% 100%, 0 100%); }
            }
            
          `;
          
        }
        
        function animatedFan() {
      
          icon.icon = "mdi:fan";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: spin 1s linear infinite;' : ''};
            }
            
            @keyframes spin {
              from { transform: rotate(0deg); }
              to   { transform: rotate(360deg); }
            }
            
          `;
          
        }
        
        function animatedVacuum() {
      
          icon.icon = "mdi:robot-vacuum";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: spin 15s ease-in-out infinite;' : ''};
            }
            
            @keyframes spin {
              0%  { transform: translate(0%, 0%) rotate(45deg); }
              5% { transform: translate(15%, -15%) rotate(45deg); }
              8% { transform: translate(15%, -15%) rotate(-90deg); }
              18% { transform: translate(-15%, -15%) rotate(-90deg); }
              21% { transform: translate(-15%, -15%) rotate(-180deg); }
              31% { transform: translate(-15%, 15%) rotate(-180deg); }
              34% { transform: translate(-15%, 15%) rotate(-270deg); }
              44% { transform: translate(15%, 15%) rotate(-270deg); }
              47% { transform: translate(15%, 15%) rotate(-405deg); }
              57% { transform: translate(-15%, -15%) rotate(-405deg); }
              60% { transform: translate(-15%, -15%) rotate(-270deg); }
              70% { transform: translate(15%, -15%) rotate(-270deg); }
              73% { transform: translate(15%, -15%) rotate(-135deg); }
              83% { transform: translate(-15%, 15%) rotate(-135deg); }
              86% { transform: translate(-15%, 15%) rotate(-270deg); }
              90% { transform: translate(0%, 15%) rotate(-270deg); }
              93% { transform: translate(0%, 15%) rotate(-360deg); }
              97% { transform: translate(0%, 0%) rotate(-360deg); }
              100% { transform: translate(0%, 0%) rotate(-315deg); }
            }
            
          `;
          
        }
        
        function animatedDishwasher() {
      
          icon.icon = "mdi:dishwasher";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: bounce 1.5s ease-in-out infinite, wash 1s ease-in-out infinite;' : ''};
              transform-origin: 50% 75%;
            }
            @keyframes bounce {
              0%, 20%, 50%, 80%, 100% {transform: translateY(0); } 
              40% { transform: translateY(-1.2px) rotate(5deg); } 
              60% { transform: translateY(-1.1px) rotate(-4deg); } 
            } 
            @keyframes wash {
              50%  { clip-path: polygon(0 0, 0 100%, 35% 100%, 36% 74%, 31% 43%, 61% 40%, 71% 69%, 62% 78%, 36% 73%, 35% 100%, 100% 100%, 100% 0); }
            }
            
          `;
          
        }
        
        function animatedDryer() {
      
          icon.icon = "mdi:tumble-dryer";
      
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
      
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: shake 400ms ease-in-out infinite, drum 1s infinite;' : ''};
              transform-origin: 50% 65%;
            }
            
            @keyframes shake {
              0%, 100% { transform: rotate(4deg); }
              50%  { transform: rotate(-4deg); }
            }
            @keyframes drum {
              50%  { clip-path: polygon(0 0, 0 100%, 35% 100%, 36% 74%, 31% 43%, 61% 40%, 71% 69%, 62% 78%, 36% 73%, 35% 100%, 100% 100%, 100% 0); }
            }
            
          `;
          
        }
        
        function animatedHeatPump() {
      
          icon.icon = "mdi:heat-pump-outline";
          
          if (iconItem && parent && !parent.querySelector('.bubble-main-icon.clone')) {
            const clone = iconItem.cloneNode(true);
            clone.icon = icon.icon;
            clone.classList.add('clone');
            clone.classList.add('clone-'+moduleConfig.mode);
            parent.insertBefore(clone, iconItem);
          }
          
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
            
            .bubble-main-icon.clone {
              clip-path: polygon(0% 0%, 0% 100%, 23% 100%, 23% 23%, 78% 22%, 77% 78%, 23% 78%, 22% 100%, 100% 100%, 100% 0%);
            }
        
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: spin 2s linear infinite;' : ''}
              clip-path: circle(27.3% at 50% 50%);
            }
        
            @keyframes spin {
              from { transform: rotate(0deg); }
              to   { transform: rotate(360deg); }
            }
          `;
        }
        
        function animatedWashingMachine() {
      
          icon.icon = "mdi:washing-machine";
          
          if (iconItem && parent && !parent.querySelector('.bubble-main-icon.clone')) {
            const clone = iconItem.cloneNode(true);
            clone.icon = icon.icon;
            clone.classList.add('clone');
            clone.classList.add('clone-'+moduleConfig.mode);
            parent.insertBefore(clone, iconItem);
          }
          
          return `
      
            .bubble-main-icon {
              display: flex;
              justify-content: center;
              align-items: center;
              position: absolute;
              top: calc((100% - var(--mdc-icon-size))/2);
              left: calc((100% - var(--mdc-icon-size))/2);
              width: var(--mdc-icon-size);
              height: var(--mdc-icon-size);
            }
            
            .bubble-main-icon.clone {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: shake 400ms ease-in-out infinite;' : ''}
              transform-origin: 50% 59%;
              clip-path: polygon(0 0, 0 100%, 35% 100%, 34% 68%, 60% 41%, 71% 56%, 65% 74%, 47% 79%, 32% 69%, 35% 100%, 100% 100%, 100% 0);
            }
        
            .bubble-main-icon:not(.clone) {
              ${(['on', 'cool', 'heat', 'heat_cool', 'auto', 'dry'].includes(state)) ? 'animation: spin 1s linear infinite;' : ''}
              transform-origin: 50% 59%;
              clip-path: circle(22% at 50% 59%);
            }
        
            @keyframes shake {
              0%, 100% { transform: translate(0, 0) rotate(0); }
              20%  { transform: translate(0.4px, -0.4px) rotate(-4deg); }
              40%  { transform: translate(-0.4px, 0.4px) rotate(4deg); }
              60%  { transform: translate(0.4px, 0.4px) rotate(-4deg); }
              80%  { transform: translate(-0.4px, -0.4px) rotate(4deg); }
            }
        
            @keyframes spin {
              from { transform: rotate(0deg); }
              to   { transform: rotate(360deg); }
            }
          `;
        }
        
      })()}


    editor:
      - name: mode
        label: Icon
        selector:
          select:
            options:
              - label: Washing Machine
                value: washing_machine
              - label: Dryer
                value: dryer
              - label: Dishwasher
                value: dishwasher
              - label: Heat Pump
                value: heat_pump
              - label: Air Purifier
                value: air_purifier
              - label: Microwave
                value: microwave
              - label: Vacuum
                value: vacuum
              - label: Fan
                value: fan
              - label: Motion
                value: motion
              - label: Boil
                value: boil
              - label: Alert
                value: alert
              - label: Alarm
                value: alarm
              - label: Ding
                value: ding
            multiple: false
            custom_value: false
            mode: dropdown