###########
# Vanning #
###########

vanning_start:
  alias: Start vanning
  description: Åpner en ventil, starter timer, og lukker ventilen automatisk
  mode: parallel
  fields:
    ventil:
      description: Ventil entity ID
      selector:
        entity:
          domain: valve
    timer:
      description: Timer entity ID
      selector:
        entity:
          domain: timer
    varighet:
      description: Varighet i minutter (1–120)
      selector:
        number:
          min: 1
          max: 120
  sequence:
    - action: valve.open_valve
      target:
        entity_id: "{{ ventil }}"
    - action: timer.start
      target:
        entity_id: "{{ timer }}"
      data:
        duration: >-
          {% set v = varighet | int %}
          {{ '%02d:%02d:%02d' | format(v // 60, v % 60, 0) }}
    - wait_for_trigger:
        - trigger: event
          event_type: timer.finished
          event_data:
            entity_id: "{{ timer }}"
        - trigger: event
          event_type: timer.cancelled
          event_data:
            entity_id: "{{ timer }}"
      timeout: "02:05:00"
    - action: valve.close_valve
      target:
        entity_id: "{{ ventil }}"
