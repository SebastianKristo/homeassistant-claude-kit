      - condition: state
        entity_id: input_boolean.sir_sweeps_a_lot_sebsatian_soverom
        state: 'off'
      - condition: state
        entity_id: input_boolean.sir_sweeps_a_lot_trappegang
        state: 'off'
    then:
    - action: vacuum.start
      metadata: {}
      data: {}
      target:
        entity_id: vacuum.sir_sweeps_a_lot
    else:
    - variables:
        room_configs:
        - name: sebasitan
          boolean: input_boolean.sir_sweeps_a_lot_sebsatian_soverom
          id: 18
        - name: mamma
          boolean: input_boolean.sir_sweeps_a_lot_mamma_soverom
          id: 17
        - name: pappa
          boolean: input_boolean.sir_sweeps_a_lot_pappa_soverom
          id: 19
        - name: kontor
          boolean: input_boolean.sir_sweeps_a_lot_pappa_kontor
          id: 22
        - name: trappegang
          boolean: input_boolean.sir_sweeps_a_lot_trappegang
          id: 16
    - variables:
        selected_rooms: "{% set ns = namespace(rooms=[]) %}\n{% for room in room_configs
          %}\n  {% if is_state(room.boolean, 'on') %}\n    {% set ns.rooms = ns.rooms
          + [room.id] %}\n  {% endif %}\n{% endfor %}\n{{ ns.rooms }}"
    - action: vacuum.send_command
      target:
        entity_id: vacuum.sir_sweeps_a_lot
      data:
        command: app_segment_clean
        params:
        - segments: '{{ selected_rooms }}'
          repeat: 1
    - wait_template: '{{ is_state(''vacuum.sir_sweeps_a_lot'',''returning'') }}'
      continue_on_timeout: true
    - action: input_boolean.turn_off
      metadata: {}
      data: {}
      target:
        entity_id:
        - input_boolean.sir_sweeps_a_lot_trappegang
        - input_boolean.sir_sweeps_a_lot_pappa_soverom
        - input_boolean.sir_sweeps_a_lot_pappa_kontor
        - input_boolean.sir_sweeps_a_lot_mamma_soverom
        - input_boolean.sir_sweeps_a_lot_sebsatian_soverom
  alias: Start Sir Sweeps A Lot Room Select
  description: Initiates a clean with Sir Sweeps A Lot. If specific rooms are selected
    via dedicated input booleans, the vacuum cleans only those segments. Otherwise,
    it performs a full clean of the entire area. Room selections are reset after the
    cleaning task is initiated.
