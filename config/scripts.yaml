cycle_vacuum_fan_speed:
  alias: Cycle Vacuum Fan Speed
  sequence:
  - variables:
      current_speed: '{{ states(''input_select.vacuum_fan_speed'') }}'
      fan_speeds:
      - 'off'
      - quiet
      - balanced
      - turbo
      - max
  - choose:
    - conditions: '{{ current_speed in fan_speeds }}'
      sequence:
      - variables:
          next_speed: '{{ fan_speeds[(fan_speeds.index(current_speed) + 1) % fan_speeds
            | length] }}

            '
      - target:
          entity_id: input_select.vacuum_fan_speed
        data:
          option: '{{ next_speed }}'
        action: input_select.select_option
      - target:
          entity_id: vacuum.sir_sweeps_a_lot
        data:
          fan_speed: '{{ next_speed }}'
        action: vacuum.set_fan_speed
    - conditions: '{{ current_speed not in fan_speeds }}'
      sequence:
      - target:
          entity_id: input_select.vacuum_fan_speed
        data:
          option: 'off'
        action: input_select.select_option
      - target:
          entity_id: vacuum.sir_sweeps_a_lot
        data:
          fan_speed: 'off'
        action: vacuum.set_fan_speed
  description: ''
