sunrise_simulator_manual:
  alias: Sunrise Simulator Manual
  sequence:
  - parallel:
    - if:
      - condition: template
        value_template: '{{ wled | count > 0 }}'
      then:
      - repeat:
          for_each: '{{ wled }}'
          sequence:
          - data:
              effect: Sunrise
            target:
              entity_id: '{{ repeat.item }}

                '
            action: light.turn_on
          - data:
              value: '{{ [(255 * (maxbri/100)) | int, 255] | min }}'
            target:
              entity_id: "{{ device_entities(device_id(repeat.item))\n      | select('search',
                'number.')\n      | select('search', 'intensity')\n      | list }}\n"
            action: number.set_value
          - data:
              value: '{{ [dur, 128] | min }}

                '
            target:
              entity_id: "{{ device_entities(device_id(repeat.item))\n      | select('search',
                'number.')\n      | select('search', 'speed')\n      | list }}\n"
            action: number.set_value
    - if:
      - condition: template
        value_template: '{{ bright | count > 0 }}'
      then:
      - repeat:
          while:
          - condition: template
            value_template: "{{ repeat.index <= maxbri\n      and not ( repeat.index
              > 1 \n                         and states.light\n                                    |
              selectattr('entity_id', 'in', bright)\n                                    |
              selectattr('state', 'eq', 'on') | list | count \n                                  ==
              \ 0 ) }}\n"
          sequence:
          - variables:
              bright: "{% if repeat.index > 1 %}\n  {{ expand(bright)\n        | selectattr('state',
                'eq', 'on')\n        | map(attribute = 'entity_id')\n        | list
                }}\n{% else %}\n  {{ bright }}\n{% endif %}\n"
          - data:
              transition: '{{ ( ( dur * 60 ) / (maxbri) ) | int }}

                '
              brightness_pct: '{{ [maxbri, ((repeat.index * maxbri) / 100)] | min
                }}

                '
            target:
              entity_id: '{{ bright }}

                '
            action: light.turn_on
          - delay:
              milliseconds: "{{ (  ( ( dur  * 60 ) / (maxbri) ) * 1000\n ) | int }}\n"
    - if:
      - condition: template
        value_template: '{{ temp | count > 0 }}'
      then:
      - repeat:
          while:
          - condition: template
            value_template: "{{ repeat.index <= 100\n      and not ( repeat.index
              > 1 \n                         and states.light\n                                    |
              selectattr('entity_id', 'in', temp)\n                                    |
              selectattr('state', 'eq', 'on') | list | count \n                                  ==
              \ 0 ) }}\n"
          sequence:
          - variables:
              step: '{{ repeat.index }}'
              temp: "{% if repeat.index > 1 %}\n  {{ expand(temp)\n        | selectattr('state',
                'eq', 'on')\n        | map(attribute = 'entity_id')\n        | list
                }}\n{% else %}\n  {{ temp }}\n{% endif %}\n"
          - repeat:
              for_each: '{{ temp }}'
              sequence:
              - data:
                  transition: '{{ ( ( dur * 60) / 100 ) | int }}

                    '
                  brightness_pct: '{{ [ ((step * maxbri) / 100) | int, maxbri] | min
                    }}

                    '
                target:
                  entity_id: '{{ repeat.item }}

                    '
                action: light.turn_on
              - data:
                  color_temp: '{% set max = state_attr(repeat.item, ''max_mireds'')
                    %} {% set min = state_attr(repeat.item, ''min_mireds'') %} {%
                    set dec = (max-min) / 100 %} {{ iif( step < 100, ( max - (dec
                    * (step - 1) ) ) | int, min ) }}

                    '
                target:
                  entity_id: '{{ repeat.item }}

                    '
                action: light.turn_on
          - delay:
              milliseconds: "{{ (  ( ( dur  * 60 ) / 100 ) * 1000\n ) | int }}\n"
    - if:
      - condition: template
        value_template: '{{ color | count > 0 }}'
      then:
      - repeat:
          while:
          - condition: template
            value_template: "{{ repeat.index <= 100\n      and not ( repeat.index
              > 1 \n                         and states.light\n                                    |
              selectattr('entity_id', 'in', color)\n                                    |
              selectattr('state', 'eq', 'on') | list | count \n                                  ==
              0 ) }}\n"
          sequence:
          - variables:
              color: "{% if repeat.index > 1 %}\n  {{ expand(color)\n        | selectattr('state',
                'eq', 'on')\n        | map(attribute = 'entity_id')\n        | list
                }}\n{% else %}\n  {{ color }}\n{% endif %}\n"
          - data:
              transition: '{{ (  ( dur * 60 ) / 100  ) | int }}

                '
              brightness_pct: '{{ [((repeat.index * maxbri) / 100) | int , maxbri]
                | min }}

                '
            target:
              entity_id: '{{ color }}

                '
            action: light.turn_on
          - data:
              rgb_color: "{% if repeat.index <= 20 %}\n  [255,0,0]\n{% elif repeat.index
                <= 40  %}\n  [255,77,0]\n{% elif repeat.index <= 60 %}\n  [255,103,0]\n{%
                elif repeat.index <= 80 %}\n  [255,129,0]  \n{% else %}\n  [255,167,0]\n{%
                endif %}\n"
            target:
              entity_id: '{{ color }}

                '
            action: light.turn_on
          - delay:
              milliseconds: '{{ (  ( ( dur * 60 ) / 100 ) * 1000 ) | int }}

                '
  variables:
    dur: '{{ duration | default(10, true) | int(10) }}

      '
    entities: "{% if target is defined %}\n  {% if target in states.light \n                     |
      rejectattr('state','in', ['unavailable', 'unknown', None])\n                     |
      selectattr('attributes.supported_color_modes', 'defined')\n                     |
      rejectattr('attributes.supported_color_modes', 'eq', None)\n                     |
      map(attribute='entity_id') \n                     | map('area_name')\n                     |
      list %}\n    {% set target = area_entities(target) %}\n  {% endif %}\n  {{ expand(target)\n
      \       | selectattr('domain', 'eq', 'light')\n        | selectattr('attributes.supported_color_modes',
      'defined')\n        | rejectattr('attributes.supported_color_modes', 'eq', None)\n
      \       | rejectattr('state', 'in', ['unavailable', 'unknown', None])\n        |
      map(attribute='entity_id')\n        | list }}\n{% elif cct is not defined\n
      \   and brightness is not defined %}\n  {{ states.light \n           | rejectattr('state','in',
      ['unavailable', 'unknown', None])\n           | selectattr('attributes.supported_color_modes',
      'defined')\n           | rejectattr('attributes.supported_color_modes', 'eq',
      None)\n           | map(attribute='entity_id') \n           | list }}\n{% endif
      %}\n"
    bright: "{{ expand(entities)\n      | selectattr('attributes.supported_color_modes',
      'eq', [ 'brightness'])\n      | map(attribute='entity_id')\n      | list + expand(
      brightness | default([], true) )\n                  | rejectattr('state', 'in',
      [ 'unavailable', 'unknown', None ])\n                  | rejectattr('entity_id',
      'in', entities)\n                  | selectattr('attributes.supported_color_modes',
      'defined')\n                  | selectattr('attributes.supported_color_modes',
      'search', 'brightness')\n                  | map(attribute='entity_id')\n                  |
      list  }}\n"
    temp: "{{ expand(entities)\n      | selectattr('attributes.supported_color_modes',
      'eq', [ 'color_temp'])\n      | map(attribute='entity_id')\n      | list + expand(
      cct | default([], true) )\n                  | rejectattr('state', 'in', [ 'unavailable',
      'unknown', None ])\n                  | rejectattr('entity_id', 'in', entities)\n
      \                 | selectattr('attributes.supported_color_modes', 'defined')\n
      \                 | selectattr('attributes.supported_color_modes', 'search',
      'color_temp')\n                  | map(attribute='entity_id')\n                  |
      list }}\n"
    wled: "{{ integration_entities('wled')\n      | select('in', expand(entities)\n
      \                       | selectattr('attributes.effect_list', 'defined')\n
      \                       | selectattr('attributes.effect_list', 'search', 'Sunrise')\n
      \                       | map(attribute='entity_id')\n                        |
      list)\n      | list }}\n"
    color: '{{ entities | reject(''in'', temp + wled + bright) | list  }}

      '
    maxbri: '{% set bri = max_brightness | default(100, true) | int(100) %} {{ bri
      if bri < 100 else 100 }}

      '
  mode: single
