blueprint:
  name: Teslemetry Garage Door Opener
  author: Brett Adams
  description: Opens a garage door when your Tesla is approching
  domain: automation
  input:
    distance_to_arrival_entity:
      name: Distance to arrival entity
      selector:
        entity:
          filter:
          - integration: teslemetry
            domain:
            - sensor
            device_class:
            - distance
          multiple: false
          reorder: false
    distance_to_arrival:
      name: Distance to arrival value to trigger open
      selector:
        number:
          min: 0.0
          max: 100.0
          step: any
          mode: box
    route_entity:
      name: Route entity
      selector:
        entity:
          filter:
          - integration: teslemetry
            domain:
            - device_tracker
          multiple: false
          reorder: false
    route_zone:
      name: Route destination
      selector:
        entity:
          filter:
          - domain:
            - zone
          multiple: false
          reorder: false
    cover_entity:
      name: Garage door entity
      selector:
        entity:
          filter:
          - domain:
            - cover
          multiple: false
          reorder: false
  source_url: https://github.com/Teslemetry/blueprints/blob/main/garage_door.yaml
trigger:
- platform: numeric_state
  entity_id:
  - !input distance_to_arrival_entity
  below: !input distance_to_arrival
  above: 0
condition:
- condition: zone
  entity_id: !input route_entity
  zone: !input route_zone
action:
- service: cover.open_cover
  target:
    entity_id: !input cover_entity
mode: restart
