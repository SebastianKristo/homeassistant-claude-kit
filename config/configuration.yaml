# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  packages:
    klimastyring: !include packages/klimastyring.yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /local/fonts.js

lovelace:
  resources:
    - url: /local/mysmart-floating-navbar.js
      type: module

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

panel_custom:
  - name: custom-dashboard-panel
    sidebar_title: Dashboard
    sidebar_icon: mdi:home-analytics
    module_url: /local/custom-dashboard/panel.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include templates.yaml
sensor: !include sensor.yaml
homey: !include homey.yaml
fan: !include fan.yaml
command_line: !include command_line.yaml
utility_meter: !include utility_meter.yaml
rest_command: !include rest_command.yaml
input_select: !include input_select.yaml
input_text: !include input_text.yaml
input_boolean: !include input_boolean.yaml
input_datetime: !include input_datetime.yaml
input_number: !include input_number.yaml
group: !include groups.yaml
light: !include lights.yaml
cover: !include cover.yaml
timer: !include timer.yaml
