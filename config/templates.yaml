        {% set dag = now().day - 1 %}
        {% set eksempler = [
          "å stå i dusjen i " ~ (forbruk / 9) | round(1) ~ " timer 🚿",
          "å kjøre elbil " ~ (forbruk / 0.2) | round(0) ~ " km 🚗⚡",
