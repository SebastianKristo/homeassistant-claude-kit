- binary_sensor:
    - name: "VVB_Legionella_OK"
      unique_id: "vvb_legionella_ok"
      delay_on:
        minutes: 5
      state: "{{ now().strftime('%Y-%m-%d %H:%M:%S') < states('input_datetime.vvb_heater_legioniella') }}"

- sensor:
    - name: "My Water Grip Total Volume m3"
      unique_id: "my_water_grip_total_colume_m3"
      unit_of_measurement: "m³"
      state: "{{ states('sensor.vannmaler_total_volume') | float(0) / 1000 }}"

    #########################################
    #                                       #
    #              SØPPEL                   #
    #       Renovasjon og påminnelser       #
    #                                       #
    #########################################

- sensor:
    - name: "Washing Machine Statuss"
      unique_id: "washing_machine_statuss"
      state: "{{ states('input_select.washing_machine_status') }}"

- sensor:
    - name: "Washing Machine Timer"
      unique_id: "waschmaschine_timer"
      state: >-
        {% if is_state('input_select.washing_machine_status', 'Running') %}
          on
        {% else %}
          off
        {% endif %}
      attributes:
        triggered: >-
          {{ as_timestamp(states.sensor.washing_machine_statuss.last_changed) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}

        remaining: >-
          {% if is_state('sensor.waschmaschine_timer', 'off') %}
            00:00:00
          {% else %}
            {% set total_time = 210 * 60 %}
            {% set start_time = as_timestamp(states.sensor.waschmaschine_timer.attributes.triggered) %}
            {% set elapsed = as_timestamp(now()) - start_time %}
            {% set remaining = total_time - elapsed %}
            {% if remaining > 0 %}
              {{ remaining | timestamp_custom('%H:%M:%S', false) }}
            {% else %}
              00:00:00
            {% endif %}
          {% endif %}

        remaining_perc: >-
          {% if is_state('sensor.waschmaschine_timer', 'off') %}
            0
          {% else %}
            {% set total_time = 210 * 60 %}
            {% set start_time = as_timestamp(states.sensor.waschmaschine_timer.attributes.triggered) %}
            {% set elapsed = as_timestamp(now()) - start_time %}
            {% set remaining = total_time - elapsed %}
            {% if remaining > 0 %}
              {{ ((remaining / total_time) * 100) | round(2) }}
            {% else %}
              0
            {% endif %}
          {% endif %}

        end_time: >-
          {% set total_time = 210 * 60 %}
          {% set start_time = as_timestamp(states.sensor.waschmaschine_timer.attributes.triggered) %}
          {{ (start_time + total_time) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}

#########################################
#                                       #
#              SØPPEL                   #
#       Renovasjon og påminnelser       #
#                                       #
#########################################

- sensor:
    - name: "Restavfall"
      unique_id: restavfall
      state: >
        {% set pickup_weekday = 0 %}
        {% set today = now().weekday() %}
        {{ (7 - today + pickup_weekday) % 7 }}
      attributes:
        days_to_pickup: >
          {% set pickup_weekday = 0 %}
          {% set today = now().weekday() %}
          {{ (7 - today + pickup_weekday) % 7 }}
        raw_date: >
          {% set pickup_weekday = 0 %}
          {% set today = now().weekday() %}
          {% set days = (7 - today + pickup_weekday) % 7 %}
          {{ (now().date() + timedelta(days=days)).isoformat() }}

    - name: "Plastemballasje"
      unique_id: plastemballasje
      state: >
        {% set pickup_weekday = 0 %}
        {% set today = now().weekday() %}
        {{ (7 - today + pickup_weekday) % 7 }}
      attributes:
        days_to_pickup: >
          {% set pickup_weekday = 0 %}
          {% set today = now().weekday() %}
          {{ (7 - today + pickup_weekday) % 7 }}
        raw_date: >
          {% set pickup_weekday = 0 %}
          {% set today = now().weekday() %}
          {% set days = (7 - today + pickup_weekday) % 7 %}
          {{ (now().date() + timedelta(days=days)).isoformat() }}

    - name: "Papir og Papp"
      unique_id: papir_og_papp
      state: >
        {% set pickup_weekday = 3 %}
        {% set today = now().weekday() %}
        {{ (7 - today + pickup_weekday) % 7 }}
      attributes:
        days_to_pickup: >
          {% set pickup_weekday = 3 %}
          {% set today = now().weekday() %}
          {{ (7 - today + pickup_weekday) % 7 }}
        raw_date: >
          {% set pickup_weekday = 3 %}
          {% set today = now().weekday() %}
          {% set days = (7 - today + pickup_weekday) % 7 %}
          {{ (now().date() + timedelta(days=days)).isoformat() }}

    - name: "Glass og metallemballasje"
      unique_id: glass_og_metallemballasje
      state: >
        {% set pickup_weekday = 3 %}
        {% set today = now().weekday() %}
        {{ (7 - today + pickup_weekday) % 7 }}
      attributes:
        days_to_pickup: >
          {% set pickup_weekday = 3 %}
          {% set today = now().weekday() %}
          {{ (7 - today + pickup_weekday) % 7 }}
        raw_date: >
          {% set pickup_weekday = 3 %}
          {% set today = now().weekday() %}
          {% set days = (7 - today + pickup_weekday) % 7 %}
          {{ (now().date() + timedelta(days=days)).isoformat() }}

    - name: "Neste tømming"
      unique_id: "neste_tomming2"
      state: >
        {% set garbage_types = {
          'sensor.restavfall': "Restavfall",
          'sensor.papir_og_papp': "Papir & Papp",
          'sensor.plastemballasje': "Plastavfall",
          'sensor.glass_og_metallemballasje': "Glass & Metall"
        } %}
        {% set pickup_days = namespace(min=999, types=[]) %}
        {% for sensor, garbage_type in garbage_types.items() %}
          {% set days = state_attr(sensor, 'days_to_pickup') | int %}
          {% if days < pickup_days.min %}
            {% set pickup_days.min = days %}
            {% set pickup_days.types = [garbage_type] %}
          {% elif days == pickup_days.min %}
            {% set pickup_days.types = pickup_days.types + [garbage_type] %}
          {% endif %}
        {% endfor %}
        {% set types_string = pickup_days.types | join(' og ') if pickup_days.types | length > 1 else pickup_days.types[0] %}
        {{ pickup_days.min }},{{ types_string }}

    - name: "Next collection"
      unique_id: "next_collection"
      state: >
        {% set garbage_types = {
          'sensor.restavfall': "Mat & Plast & Restavfall",
          'sensor.papir_og_papp': "Papir & Papp"
        } %}
        {% set pickup_days = namespace(min=999, types=[]) %}
        {% for sensor, garbage_type in garbage_types.items() %}
          {% set days = state_attr(sensor, 'days_to_pickup') | int(0) %}
          {% if days < pickup_days.min %}
            {% set pickup_days.min = days %}
            {% set pickup_days.types = [garbage_type] %}
          {% elif days == pickup_days.min %}
            {% set pickup_days.types = pickup_days.types + [garbage_type] %}
          {% endif %}
        {% endfor %}
        {% set types_string = pickup_days.types | join(' and ') if pickup_days.types | length > 1 else pickup_days.types[0] if pickup_days.types | length > 0 else 'None' %}
        {{ pickup_days.min }},{{ types_string }}

