- sensor:
    - name: "Ute AirQuality"
      unique_id: "ute_airquality"
      state: >
        {% set co2_value = states('sensor.oslo_carbon_monoxide') | float(default=4500) %}
        {% set pm25_value = states('sensor.oslo_pm2_5') | float(default=225.4) %}
        {% set temp_value = states('sensor.hus_temperature') | float(default=21) %}
        {% set humidity_value = states('sensor.hus_fuktighet') | float(default=45) %}

        {# CO2 Score calculation #}
        {% if co2_value >= 4500 %}
          {% set co2_score = 0 %}
        {% elif co2_value <= 400 %}
          {% set co2_score = 100 %}
        {% else %}
          {% set co2_score = ((4500 - co2_value) / (4500 - 400)) * 100 %}
        {% endif %}

        {# PM2.5 Score calculation #}
        {% if pm25_value >= 225.4 %}
          {% set pm25_score = 0 %}
        {% elif pm25_value <= 10 %}
          {% set pm25_score = 100 %}
        {% else %}
          {% set pm25_score = ((225.4 - pm25_value) / (225.4 - 10)) * 100 %}
        {% endif %}

        {# Temperature scoring #}
        {% set ideal_temp = 21 %}
        {% set temp_deviation = (temp_value - ideal_temp) | abs %}
        {% if temp_deviation >= 10 %}
          {% set temp_score = 0 %}
        {% else %}
          {% set temp_score = 100 - (temp_deviation * 10) %}
        {% endif %}

        {# Humidity scoring #}
        {% if humidity_value < 30 %}
          {% set humidity_score = (humidity_value / 30) * 100 %}
        {% elif humidity_value > 60 %}
          {% set humidity_score = ((100 - humidity_value) / 40) * 100 %}
        {% else %}
          {% set humidity_score = 100 %}
        {% endif %}

        {# Final weighted score - adjusted weights to include VOC #}
        {{ ((co2_score * 0.25 + pm25_score * 0.25 + temp_score * 0.125 + humidity_score * 0.125) | round(1)) }}

- sensor:
    - name: "Ute AirQuality Alt"
      unique_id: "ute_airquality_alt"
      state: >
        {% set co2 = states('sensor.oslo_carbon_monoxide') | float %}
        {% set nox = states('sensor.oslo_nitrogen_dioxide') | float %}
        {% set pm25 = states('sensor.oslo_pm2_5') | float %}
        {% set pm10 = states('sensor.oslo_pm10') | float %}

        {% set scores = [] %}

        {# CO2 Score #}
        {% if co2 <= 599 %}
          {% set scores = scores + [90] %}
        {% elif co2 <= 999 %}
          {% set scores = scores + [70] %}
        {% elif co2 <= 1499 %}
          {% set scores = scores + [50] %}
        {% elif co2 <= 2499 %}
          {% set scores = scores + [30] %}
        {% else %}
          {% set scores = scores + [10] %}
        {% endif %}

        {# NOx Score #}
        {% if nox <= 49 %}
          {% set scores = scores + [90] %}
        {% elif nox <= 99 %}
          {% set scores = scores + [70] %}
        {% elif nox <= 299 %}
          {% set scores = scores + [50] %}
        {% elif nox <= 349 %}
          {% set scores = scores + [30] %}
        {% else %}
          {% set scores = scores + [10] %}
        {% endif %}



        {# PM2.5 Score #}
        {% if pm25 <= 20 %}
          {% set scores = scores + [90] %}
        {% elif pm25 <= 50 %}
          {% set scores = scores + [70] %}
        {% elif pm25 <= 90 %}
          {% set scores = scores + [50] %}
        {% elif pm25 <= 140 %}
          {% set scores = scores + [30] %}
        {% else %}
          {% set scores = scores + [10] %}
        {% endif %}

        {# PM10 Score #}
        {% if pm10 <= 30 %}
          {% set scores = scores + [90] %}
        {% elif pm10 <= 75 %}
          {% set scores = scores + [70] %}
        {% elif pm10 <= 125 %}
          {% set scores = scores + [50] %}
        {% elif pm10 <= 200 %}
          {% set scores = scores + [30] %}
        {% else %}
          {% set scores = scores + [10] %}
        {% endif %}

        {{ (scores | sum / scores | length) | round(1) }}

# Car

- sensor:
    - name: "Ioniq Custom"
      unique_id: "ioniq_custom"
      state: "Yo"
      attributes:
        ladetid_hours: >
          {% set battery_level = states('sensor.tesla_model_y_batteri_batteriniva') | float %}
          {% set soc = states('input_number.tesla_model_y_ladegrense') | round() %}
          {{ ((soc - battery_level) * 75 / 100 / 4.1) | round() }}
        ladetid: >
          {% set charge_needed = [0, (states('input_number.tesla_model_y_ladegrense') | float | round - states('sensor.tesla_model_y_batteri_batteriniva') | float)] | max %}
          {% set total_seconds = (charge_needed * 75 / 100 / 4.1) * 3600 %}
          {% set h = (total_seconds / 3600) | int %}
          {% set m = ((total_seconds % 3600) / 60) | int %}
          {% set s = (total_seconds % 60) | int %}
          {{ h }}h {{ m }}m {{ s }}s
        ladepris: >
          {% set battery_level = states('sensor.tesla_model_y_batteri_batteriniva') | float %}
          {% set soc = states('input_number.tesla_model_y_ladegrense') | round(0) | float %}
          {% set pris = states('sensor.norgespris_pris_na') | float %}
          {% set charge_needed = (soc - battery_level) / 100 %}
          {{ (pris * ([0, charge_needed] | max) * 75) | round(0) }}

- sensor:
    - name: "Ioniq Ladepris"
      name: Ioniq 5 ladepris
      state:
        "{% set battery_level = states('sensor.tesla_model_y_batteri_batteriniva') | float
