#         ENERGI KOSTNADSSENSORER       #
#         Cost Hour, Day, Monthly       #
#                                       #
#########################################

- sensor:
    - name: "Fastpris 40 øre med nettleie og MVA"
      unique_id: fastpris_40_med_nettleie_og_mva
      unit_of_measurement: "øre/kWh"
      state_class: measurement
      state: >
        {% set fastpris = 40.0 %}
        {% set day_cost = states('input_number.grid_day_hourly_cost') | float(0) %}
        {% set night_cost = states('input_number.grid_night_hourly_cost') | float(0) %}
        {% set hour = now().hour %}
        {% if 22 <= hour or hour < 6 %}
          {% set nettleie = night_cost %}
        {% else %}
          {% set nettleie = day_cost %}
        {% endif %}
        {% set total_uten_mva = fastpris + nettleie %}
        {{ (total_uten_mva * 1.25) | round(2) }}

#########################################
#                                       #
#         TIBBER & NORGESPRIS           #
#                                       #
#########################################

- trigger:
    - trigger: time_pattern
      minutes: "0"
    - trigger: homeassistant
      event: start
  action:
    - action: tibber.get_prices
      data:
        end: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d 23:59:59') }}"
      response_variable: tibber_data
  sensor:
    - name: Strømpris Norgespris
      unique_id: strompris_norgespris_kalkulert
      unit_of_measurement: "NOK/kWh"
      state_class: measurement
      icon: mdi:cash-100
      state: >
        {% set fastpris = 0.50 %}
        {% set nettleie_dag = 0.37 %}
        {% set nettleie_natt = 0.22 %}
        {% set t = now() %}
        {% set er_helg = t.isoweekday() > 5 %}
        {% set er_dagtid = t.hour >= 6 and t.hour < 22 %}
        {% if er_helg or not er_dagtid %}
          {{ (fastpris + nettleie_natt) | round(4) }}
        {% else %}
          {{ (fastpris + nettleie_dag) | round(4) }}
        {% endif %}
      attributes:
        data: >
          {% set utdata = namespace(priser=[]) %}
          {% set fastpris = 0.50 %}
          {% set nettleie_dag = 0.37 %}
          {% set nettleie_natt = 0.22 %}
          {% if tibber_data is defined and tibber_data['prices'] is defined %}
            {% set key = tibber_data['prices'] | list | first %}
            {% for intervall in tibber_data['prices'][key] %}
              {% set t = intervall.start_time | as_datetime | as_local %}
              {% set er_helg = t.isoweekday() > 5 %}
              {% set er_dagtid = t.hour >= 6 and t.hour < 22 %}
              {% if er_helg or not er_dagtid %}
                {% set total = fastpris + nettleie_natt %}
              {% else %}
                {% set total = fastpris + nettleie_dag %}
              {% endif %}
              {% set utdata.priser = utdata.priser + [{
                'start_time': intervall.start_time, 
                'price_per_kwh': total | round(4)
              }] %}
            {% endfor %}
          {% endif %}
          {{ utdata.priser }}

