#########################################
#                                       #
#         WAKE ALARM SENSORER           #
#                                       #
#########################################

- sensor:
    - name: "Wake Time 1"
      unique_id: waketime1
      state: "{{ '{:02d}:{:02d}'.format(states('input_number.wakehour_1') | int(0), states('input_number.wakeminute_1') | int(0)) }}"
      icon: mdi:alarm

    - name: "Light Alarm Time 1"
      unique_id: lightalarmtime1
      state: >
        {% set wake_time = states('sensor.wake_time_1') %}
        {% set offset_minutes = states('input_number.light_alarm_offset') | float(0) %}
        {% if wake_time not in ['unknown', 'unavailable'] %}
          {{ (today_at(wake_time) - timedelta(minutes=offset_minutes)).strftime('%H:%M') }}
        {% else %}
          unknown
        {% endif %}
      icon: mdi:lightbulb-on

    - name: "Light Alarm Readable 1"
      unique_id: lightalarmreadable1
      state: >
        {% if has_value('sensor.light_alarm_time') %}
          {{ states('sensor.light_alarm_time') }}
        {% else %}
          unknown
        {% endif %}
      icon: mdi:clock-digital

    - name: "Is Alarm turned on today"
      unique_id: isalarmtoday
      state: >
        {% set today = 'input_boolean.wakeweekday_' ~ now().strftime("%a") | lower ~ '_1' %}
        {{ is_state(today, 'on') }}
      icon: mdi:calendar-today

    - name: "Is Alarm turned on tomorrow"
      unique_id: isalarmtomorrow
      state: >
        {% set tomorrow = 'input_boolean.wakeweekday_' ~ (as_timestamp(now()) + 86400) | timestamp_custom("%a", true) | lower ~ '_1' %}
        {{ is_state(tomorrow, 'on') }}
      icon: mdi:calendar-arrow-right

    - name: "Is Alarm turned on"
      unique_id: isalarmon
      state: >
        {% if is_state('input_boolean.light_alarm', 'on') or is_state('input_boolean.sound_alarm', 'on') %}
          {% if is_state('sensor.time_of_day', 'night') %}
            {% set today = 'input_boolean.wakeweekday_' ~ now().strftime("%a") | lower ~ '_1' %}
            {{ is_state(today, 'on') }}
          {% elif is_state('sensor.time_of_day', 'morning') %}
            {% if is_state('input_boolean.alarm_has_run', 'on') %}
              false
            {% else %}
              {% set today = 'input_boolean.wakeweekday_' ~ now().strftime("%a") | lower ~ '_1' %}
              {{ is_state(today, 'on') }}
            {% endif %}
          {% else %}
            {% set tomorrow = 'input_boolean.wakeweekday_' ~ (as_timestamp(now()) + 86400) | timestamp_custom("%a", true) | lower ~ '_1' %}
            {{ is_state(tomorrow, 'on') }}
          {% endif %}
        {% else %}
          false
        {% endif %}
      icon: mdi:alarm-check

    - name: "Time of day"
      unique_id: timeofday
      state: >
        {% set ct = now().hour + now().minute / 60 + now().second / 3600 %}
        {% if 6 < ct <= 12 %}
          morning
        {% elif 12 < ct <= 20 %}
          day
        {% elif 20 < ct <= 24 %}
          evening
        {% else %}
          night
        {% endif %}
      icon: mdi:theme-light-dark

