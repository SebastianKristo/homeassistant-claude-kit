#########################################
#                                       #
#         STRØMKOSTNAD BEREGNINGER      #
#                                       #
#########################################

- sensor:
    - name: "Strømpris ink. avgifter"
      unique_id: stromtotal
      unit_of_measurement: "NOK/kWh"
      state: >
        {% set today = now() %}
        {% set next_month = (today + timedelta(days=32)).replace(day=1) %}
        {% set start_of_month = today.replace(day=1) %}
        {% set numberofdays = (next_month - start_of_month).days %}
        {% set fastledd = (375 / numberofdays) / 24 %}
        {% if (now().hour > 5 and now().hour < 23) and (now().weekday() < 5) %}
          {% set energiledd = 0.52 + fastledd %}
        {% else %}
          {% set energiledd = 0.45 + fastledd %}
        {% endif %}
        {% set stromstotteLevel = 0.9125 %}
        {% if states('sensor.totalpris_strompris_kroner') | float(0) > stromstotteLevel %}
          {% set stromstotte = (states('sensor.totalpris_strompris_kroner') | float(0) - stromstotteLevel) * 0.9 %}
        {% else %}
          {% set stromstotte = 0 %}
        {% endif %}
        {% set total = states('sensor.totalpris_strompris_kroner') | float(0) - stromstotte + energiledd %}
        {{ total | round(2) }}

    - name: "Totalpris Strømpris Kroner"
      unique_id: totalpris_strompris_kroner
      unit_of_measurement: "kr/kWh"
      device_class: monetary
      state: >
        {% set pris_ore = states('sensor.totalpris_inkludert_grid_el_company_og_stromstotte') | float(0) %}
        {{ (pris_ore / 100) | round(4) }}

    - name: "Cost to run PC per hour"
      unique_id: pc_electricity_cost
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 0.08) | round(2) }}

    - name: "Cost to run TV (1h)"
      unique_id: tv_cost_1h
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 0.15) | round(2) }}

    - name: "Cost to charge laptop (1h, 65W)"
      unique_id: laptop_charge_cost_1h
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 0.065) | round(2) }}

    - name: "Cost to run dishwasher for 45 minutes"
      unique_id: dishwasher_cost_45min
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 1.6) | round(2) }}

    - name: "Cost to run washingmachine for 45 minutes"
      unique_id: washing_machine_cost_1h
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 2.0) | round(2) }}

    - name: "Cost to run vacuum cleaner (30min)"
      unique_id: vacuum_cleaner_cost_30min
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 0.5) | round(2) }}

    - name: "Cost to heat water heater (1h)"
      unique_id: water_heater_cost_1h
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 2.2) | round(2) }}

    - name: "Cost to run panel heater (1h, 1000W)"
      unique_id: panel_heater_cost_1h
      unit_of_measurement: "NOK"
      state: >
        {{ (states('sensor.totalpris_strompris_kroner') | float(0) * 1.0) | round(2) }}

    - name: "Cost of hot shower (20min)"
      unique_id: shower_cost_20min
