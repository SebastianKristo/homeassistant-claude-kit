# ============================================================
# EV Sparing - Template Sensor
# Legg til i configuration.yaml under:  template:
# ============================================================
#
# Sensorer brukt:
#   sensor.tesla_model_y_batteri_ladeenergimaler        → Totalt kWh forbrukt (livsløp)
#   sensor.tesla_model_y_batteri_ladet_energi_lagt_til  → Siste lading tilført kWh
#   sensor.tesla_model_y_kilometerteller                → Total km kjørt (odometer)
#   sensor.tesla_model_y_daglig_kjoring                 → Km kjørt i dag
#   sensor.gas_prices                                   → fuelTypeId:1 = diesel (live)
#
# Reelt kWh/100km beregnes fra faktisk total kWh / total km.
# Oppdateres automatisk når kWh eller km-sensor endrer seg.
# ============================================================

- sensor:
    - name: "EV Sparing Oversikt"
      unique_id: ev_sparing_oversikt
      unit_of_measurement: "kr"
      state_class: total
      device_class: monetary
      icon: mdi:lightning-bolt-circle

      # Hovedverdi: total akkumulert sparing i kr
      state: >
        {% set total_kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
        {% set total_km  = states('sensor.tesla_model_y_kilometerteller') | float(0) %}
        {% set el_pris   = 0.80 %}
        {% set diesel_per_100km = 7.5 %}

        {% set diesel_pris = namespace(verdi=24.85) %}
        {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
          {% for pris in stasjon.prices or [] %}
            {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
              {% set diesel_pris.verdi = pris.price | float %}
            {% endif %}
          {% endfor %}
        {% endfor %}

        {% set el_kostnad      = total_kwh * el_pris %}
        {% set diesel_kostnad  = (total_km / 100) * diesel_per_100km * diesel_pris.verdi %}
        {{ (diesel_kostnad - el_kostnad) | round(2) }}

      attributes:
        # ── Priser ──────────────────────────────────────────────
        diesel_pris: >
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ diesel_pris.verdi | round(2) }}

        el_pris: 0.80

        # ── Faktisk forbruk ─────────────────────────────────────
        total_kwh_forbrukt: >
          {{ states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) | round(1) }}

        total_km_kjort: >
          {{ states('sensor.tesla_model_y_kilometerteller') | float(0) | round(0) | int }}

        daglig_km: >
          {{ states('sensor.tesla_model_y_daglig_kjoring') | float(0) | round(1) }}

        # Reelt kWh/100km basert på faktisk kjøring
        reelt_kwh_per_100km: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% if km > 0 %}
            {{ ((kwh / km) * 100) | round(2) }}
          {% else %}
            0
          {% endif %}

        # ── Kostnader totalt ────────────────────────────────────
        total_el_kostnad: >
          {{ (states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) * 0.80) | round(2) }}

        total_diesel_kostnad: >
          {% set total_km = states('sensor.tesla_model_y_kilometerteller') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ ((total_km / 100) * 7.5 * diesel_pris.verdi) | round(2) }}

        total_sparing: >
          {% set total_kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set total_km  = states('sensor.tesla_model_y_kilometerteller') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set diesel_kost = (total_km / 100) * 7.5 * diesel_pris.verdi %}
          {% set el_kost     = total_kwh * 0.80 %}
          {{ (diesel_kost - el_kost) | round(2) }}

        sparing_prosent: >
          {% set total_kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set total_km  = states('sensor.tesla_model_y_kilometerteller') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set diesel_kost = (total_km / 100) * 7.5 * diesel_pris.verdi %}
          {% set el_kost     = total_kwh * 0.80 %}
          {% if diesel_kost > 0 %}
            {{ (((diesel_kost - el_kost) / diesel_kost) * 100) | round(0) | int }}
          {% else %}
            0
          {% endif %}

        # ── Per 100 km (reelt forbruk) ──────────────────────────
        el_kostnad_per_100km: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {{ (reelt_kwh_per_100km * 0.80) | round(2) }}

        diesel_kostnad_per_100km: >
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ (7.5 * diesel_pris.verdi) | round(2) }}

        sparing_per_100km: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ ((7.5 * diesel_pris.verdi) - (reelt_kwh_per_100km * 0.80)) | round(2) }}

        # ── Daglig kjøring ──────────────────────────────────────
        daglig_el_kostnad: >
          {% set daglig_km = states('sensor.tesla_model_y_daglig_kjoring') | float(0) %}
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {{ ((daglig_km / 100) * reelt_kwh_per_100km * 0.80) | round(2) }}

        daglig_diesel_kostnad: >
          {% set daglig_km = states('sensor.tesla_model_y_daglig_kjoring') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ ((daglig_km / 100) * 7.5 * diesel_pris.verdi) | round(2) }}

        daglig_sparing: >
          {% set daglig_km = states('sensor.tesla_model_y_daglig_kjoring') | float(0) %}
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set diesel_kost = (daglig_km / 100) * 7.5 * diesel_pris.verdi %}
          {% set el_kost     = (daglig_km / 100) * reelt_kwh_per_100km * 0.80 %}
          {{ (diesel_kost - el_kost) | round(2) }}

        # ── Siste lading ────────────────────────────────────────
        siste_lading_kwh: >
          {{ states('sensor.tesla_model_y_batteri_ladet_energi_lagt_til') | float(0) | round(1) }}

        siste_lading_kostnad: >
          {{ (states('sensor.tesla_model_y_batteri_ladet_energi_lagt_til') | float(0) * 0.80) | round(2) }}

        siste_lading_km_rekkevidde: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set lading_kwh = states('sensor.tesla_model_y_batteri_ladet_energi_lagt_til') | float(0) %}
          {{ ((lading_kwh / reelt_kwh_per_100km) * 100) | round(0) | int }}

        siste_lading_diesel_ekvivalent: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set lading_kwh = states('sensor.tesla_model_y_batteri_ladet_energi_lagt_til') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set lading_km = (lading_kwh / reelt_kwh_per_100km) * 100 %}
          {{ ((lading_km / 100) * 7.5 * diesel_pris.verdi) | round(2) }}

        siste_lading_sparing: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set lading_kwh = states('sensor.tesla_model_y_batteri_ladet_energi_lagt_til') | float(0) %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set lading_km  = (lading_kwh / reelt_kwh_per_100km) * 100 %}
          {% set diesel_kost = (lading_km / 100) * 7.5 * diesel_pris.verdi %}
          {% set el_kost     = lading_kwh * 0.80 %}
          {{ (diesel_kost - el_kost) | round(2) }}

        # ── Årsestimater (basert på reelt forbruk, 20 000 km) ───
        aarlig_el_kostnad: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {{ ((20000 / 100) * reelt_kwh_per_100km * 0.80) | round(0) | int }}

        aarlig_diesel_kostnad: >
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ ((20000 / 100) * 7.5 * diesel_pris.verdi) | round(0) | int }}

        aarlig_sparing: >
          {% set kwh = states('sensor.tesla_model_y_batteri_ladeenergimaler') | float(0) %}
          {% set km  = states('sensor.tesla_model_y_kilometerteller') | float(1) %}
          {% set reelt_kwh_per_100km = (kwh / km) * 100 if km > 0 else 18.0 %}
          {% set diesel_pris = namespace(verdi=24.85) %}
          {% for stasjon in state_attr('sensor.gas_prices', 'stations') or [] %}
            {% for pris in stasjon.prices or [] %}
              {% if pris.fuelTypeId | int == 1 and not pris.deleted %}
                {% set diesel_pris.verdi = pris.price | float %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set diesel = (20000 / 100) * 7.5 * diesel_pris.verdi %}
          {% set el     = (20000 / 100) * reelt_kwh_per_100km * 0.80 %}
          {{ (diesel - el) | round(0) | int }}


#########################################
#                                       #
#         VANN AKTIVITET                #
#                                       #
#########################################

# Kategoriserer øyeblikkelig vannforbruk basert på flyt (L/min) og vanntype.
# Avhengig av sensor.vann_flyt (derivative fra sensor.yaml).

- sensor:
    - name: "Vann aktivitet kategori"
      unique_id: vann_aktivitet_kategori
      state: >
        {% set flow = states('sensor.vann_flyt') | float(0) %}
        {% set water_type = states('sensor.vannmaler_water_type') | lower %}
        {% if flow < 0.1 %}
          Ingen aktivitet
        {% elif flow < 1.5 %}
          Handvask
        {% elif flow < 4 %}
          Toalett
        {% elif flow < 9 %}
          {% if water_type == 'hot' %}
            Oppvask (varm)
          {% else %}
            Vask / oppvask
          {% endif %}
        {% elif flow < 14 %}
          Dusj
        {% else %}
          Badekar
        {% endif %}
      attributes:
        flow_lpm: "{{ states('sensor.vann_flyt') | float(0) | round(1) }}"
        water_type: "{{ states('sensor.vannmaler_water_type') }}"
      icon: >
        {% set flow = states('sensor.vann_flyt') | float(0) %}
        {% if flow < 0.1 %}
          mdi:water-off
        {% elif flow < 4 %}
          mdi:water-drop
        {% elif flow < 9 %}
          mdi:water-pump
        {% elif flow < 14 %}
          mdi:shower
        {% else %}
          mdi:bathtub
        {% endif %}

#########################################
#                                       #
#         VANNING ANBEFALING            #
#                                       #
#########################################

# Anbefaler vanningsprogram basert på nedbørsvarsel og temperatur.
# Attributten anbefalt_minutter brukes av dashbordet for å foreslå varighet.

- sensor:
    - name: "Vanning anbefaling"
      unique_id: vanning_anbefaling
      state: >
        {% set regn30 = states('sensor.vaervarsel_regn_neste_30_minutter') | float(0) %}
        {% set regn1t  = states('sensor.vaervarsel_regn_neste_time')        | float(0) %}
        {% set regn6t  = states('sensor.vaervarsel_regn_neste_6_timer')     | float(0) %}
        {% set regn_om = states('sensor.vaervarsel_regn_starter_om')        | int(1440) %}
        {% set temp    = states('sensor.outdoor_meter_temperature')         | float(15) %}
        {% set terskel = states('input_number.vanning_regn_terskel')        | float(2) %}
        {% if regn30 > 0.5 %}
          Hopp over — regner nå
        {% elif regn1t > terskel %}
          {% if regn_om < 60 %}
            Vent — regn om {{ regn_om }} min
          {% else %}
            Vent — regn om {{ (regn_om // 60) }}t
          {% endif %}
        {% elif regn6t > terskel %}
          Vent — {{ regn6t | round(1) }} mm forventet
        {% elif temp > 25 %}
          Vann nå: 30 min (varmt)
        {% elif temp > 18 %}
          Vann nå: 20 min
        {% else %}
          Vann nå: 15 min
        {% endif %}
      attributes:
        anbefalt_minutter: >
          {% set regn30 = states('sensor.vaervarsel_regn_neste_30_minutter') | float(0) %}
          {% set regn1t  = states('sensor.vaervarsel_regn_neste_time')        | float(0) %}
          {% set regn6t  = states('sensor.vaervarsel_regn_neste_6_timer')     | float(0) %}
          {% set temp    = states('sensor.outdoor_meter_temperature')         | float(15) %}
          {% set terskel = states('input_number.vanning_regn_terskel')        | float(2) %}
          {% if regn30 > 0.5 or regn1t > terskel or regn6t > terskel %}
            0
          {% elif temp > 25 %}
            30
          {% elif temp > 18 %}
            20
          {% else %}
            15
          {% endif %}
        skip_reason: >
          {% set regn30 = states('sensor.vaervarsel_regn_neste_30_minutter') | float(0) %}
          {% set regn1t  = states('sensor.vaervarsel_regn_neste_time')        | float(0) %}
          {% set regn6t  = states('sensor.vaervarsel_regn_neste_6_timer')     | float(0) %}
          {% set terskel = states('input_number.vanning_regn_terskel')        | float(2) %}
          {% if regn30 > 0.5 %}
            Regner nå
          {% elif regn1t > terskel or regn6t > terskel %}
            Regn forventet
          {% else %}
            none
          {% endif %}
      icon: >
        {% set regn6t  = states('sensor.vaervarsel_regn_neste_6_timer') | float(0) %}
        {% set terskel = states('input_number.vanning_regn_terskel')    | float(2) %}
        {% if regn6t > terskel %}
          mdi:umbrella
        {% else %}
          mdi:sprinkler-variant
        {% endif %}


#########################################
#                                       #
#      HVITVARE GJENVÆRENDE TID         #
#                                       #
#########################################

# Vaskemaskin: 1t 10min (70 min) program.
# Bruker last_changed på input_select.washing_machine_status når tilstand = "Running".
# sensor.time (fra time_date platform) oppdateres hvert minutt og gjør at malen re-evalueres.

- sensor:
    - name: "Vaskemaskin gjenstår"
      unique_id: vaskemaskin_gjenstaar
      unit_of_measurement: "min"
      icon: mdi:washing-machine
      state: >
        {% set _tick = states('sensor.time') %}
        {% if is_state('input_select.washing_machine_status', 'Running') %}
          {% set started = as_timestamp(states.input_select.washing_machine_status.last_changed) %}
          {% set elapsed = (now() | as_timestamp - started) / 60 %}
          {{ [70 - elapsed | round(0) | int, 0] | max }}
        {% else %}
          0
        {% endif %}

# Oppvaskmaskin: 40 min program.
# Starttid lagres i input_datetime.oppvaskmaskin_start via automatisering.

- sensor:
    - name: "Oppvaskmaskin gjenstår"
      unique_id: oppvaskmaskin_gjenstaar
      unit_of_measurement: "min"
      icon: mdi:dishwasher
      state: >
        {% set _tick = states('sensor.time') %}
        {% set power = states('sensor.oppvaskmaskin_effekt') | float(0) %}
        {% if power > 10 %}
          {% set started = as_timestamp(states('input_datetime.oppvaskmaskin_start')) %}
          {% if started and started > 0 %}
            {% set elapsed = (now() | as_timestamp - started) / 60 %}
            {{ [40 - elapsed | round(0) | int, 0] | max }}
          {% else %}
            40
          {% endif %}
        {% else %}
          0
        {% endif %}
