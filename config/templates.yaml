    # Estimert total månedskostnad basert på forbruk så langt
    - name: "Estimert Månedlig Strømregning"
      unique_id: estimert_manedlig_stromregning
      unit_of_measurement: "NOK"
      device_class: monetary
      state: >
        {% set forbruk_hittil = states('sensor.strommaler_powercalc_energy_monthly') | float(0) %}
        {% set dag_i_maned = now().day %}
        {% set dager_i_maned = (now().replace(day=1) + timedelta(days=32)).replace(day=1) - timedelta(days=1) %}
        {% set dager_totalt = dager_i_maned.day %}
        {% set pris_ore = states('sensor.totalpris_inkludert_grid_el_company_og_stromstotte') | float(0) %}
        {% set pris_kr = pris_ore / 100 %}
        {% set estimert_forbruk = (forbruk_hittil / dag_i_maned) * dager_totalt %}
        {{ (estimert_forbruk * pris_kr) | round(2) }}

    - name: "Eksperementel Estimert Månedlig Strømregning"
      unique_id: eksperementel_estimert_manedlig_stromregning
      unit_of_measurement: "NOK"
      device_class: monetary
      state: >
        {% set forbruk_hittil = states('sensor.strommaler_powercalc_energy_monthly') | float(0) %}
        {% set dag_i_maned = now().day %}
        {% set maned = now().month %}
        {% set dager_i_maned = (now().replace(day=1) + timedelta(days=32)).replace(day=1) - timedelta(days=1) %}
        {% set dager_totalt = dager_i_maned.day %}
        {% set pris_ore = states('sensor.totalpris_inkludert_grid_el_company_og_stromstotte') | float(0) %}
        {% set pris_kr = pris_ore / 100 %}

        {# Ditt faktiske historiske forbruk per måned #}
        {% set historisk_forbruk = {
          1: 2300,
          2: 1900,
          3: 1800,
          4: 1200,
          5: 1100,
          6: 700,
          7: 650,
          8: 850,
          9: 850,
          10: 1300,
          11: 1800,
          12: 2200
        } %}

        {# Beregn vektet estimat #}
        {% if dag_i_maned <= 5 %}
          {# Tidlig i måneden: bruk historisk data #}
          {% set estimert_forbruk = historisk_forbruk[maned] %}
        {% elif dag_i_maned <= 15 %}
          {# Midten av måneden: 50% faktisk trend, 50% historisk #}
          {% set daglig_snitt = forbruk_hittil / dag_i_maned %}
          {% set trend_estimat = daglig_snitt * dager_totalt %}
          {% set historisk_estimat = historisk_forbruk[maned] %}
          {% set estimert_forbruk = (trend_estimat * 0.5) + (historisk_estimat * 0.5) %}
        {% else %}
          {# Slutten av måneden: bruk faktisk trend #}
          {% set daglig_snitt = forbruk_hittil / dag_i_maned %}
          {% set estimert_forbruk = daglig_snitt * dager_totalt %}
        {% endif %}

        {{ (estimert_forbruk * pris_kr) | round(2) }}

    # Hjelpesensor: Estimert månedlig forbruk i kWh
    - name: "Eksperementel Estimert Månedlig Forbruk"
      unit_of_measurement: "kWh"
      device_class: energy
      state: >
        {% set forbruk_hittil = states('sensor.strommaler_powercalc_energy_monthly') | float(0) %}
        {% set dag_i_maned = now().day %}
        {% set maned = now().month %}
        {% set dager_i_maned = (now().replace(day=1) + timedelta(days=32)).replace(day=1) - timedelta(days=1) %}
        {% set dager_totalt = dager_i_maned.day %}

        {% set historisk_forbruk = {
          1: 2300, 2: 1900, 3: 1800, 4: 1200, 5: 1100, 6: 700,
          7: 650, 8: 850, 9: 850, 10: 1300, 11: 1800, 12: 2200
        } %}

        {% if dag_i_maned <= 5 %}
          {% set estimert_forbruk = historisk_forbruk[maned] %}
        {% elif dag_i_maned <= 15 %}
          {% set daglig_snitt = forbruk_hittil / dag_i_maned %}
          {% set trend_estimat = daglig_snitt * dager_totalt %}
          {% set historisk_estimat = historisk_forbruk[maned] %}
          {% set estimert_forbruk = (trend_estimat * 0.5) + (historisk_estimat * 0.5) %}
        {% else %}
          {% set daglig_snitt = forbruk_hittil / dag_i_maned %}
          {% set estimert_forbruk = daglig_snitt * dager_totalt %}
        {% endif %}

        {{ estimert_forbruk | round(1) }}

    - name: "Total Fastledd År"
