#########################################
#                                       #
#              VÆR                      #
#         Værdata og prognoser          #
#                                       #
#########################################

- sensor:
    - name: "Temprature_feels_like"
      unit_of_measurement: "°C"
      state: >
        {% set T = state_attr('weather.forecast_home', 'temperature') | float(0) %}
        {% set K = (state_attr('weather.forecast_home', 'wind_speed') | float(0)) / 3.6 %}
        {% set V = (K / 1000 * 60 * 60) %}
        {% set A = 13.12 + 0.6215 * T - 11.37 * (V ** 0.16) + 0.3965 * T * (V ** 0.16) %}
        {{ A | round(1) }}

    - name: "Weather Info English"
      unique_id: "weather_info_eng"
      state: >
        {% set weather = states('weather.forecast_home') %}
        {% if is_state('sun.sun', 'above_horizon') %}
          {{ '/local/weather/' ~ weather ~ '.svg' }}
        {% else %}
          {{ '/local/weather/' ~ weather ~ '_night.svg' }}
        {% endif %}
      attributes:
        temp: >
          {{ state_attr('weather.forecast_home', 'temperature') }}
        feels_like: >
          {% set T = state_attr('weather.forecast_home', 'temperature') | float(0) %}
          {% set K = (state_attr('weather.forecast_home', 'wind_speed') | float(0)) / 3.6 %}
          {% set V = (K / 1000 * 60 * 60) %}
          {% set A = 13.12 + 0.6215 * T - 11.37 * (V ** 0.16) + 0.3965 * T * (V ** 0.16) %}
          {{ A | round(1) }}
        desc: >
          {{ states('weather.forecast_home') }}
        precipitation: >
          {% set forecast = state_attr('weather.forecast_home', 'forecast') %}
          {{ forecast[0].precipitation if forecast is not none and forecast | length > 0 else 0 }}
        precipitation_percent: >
          {% set forecast = state_attr('weather.forecast_home', 'forecast') %}
          {{ forecast[0].precipitation_probability if forecast is not none and forecast | length > 0 else 0 }}
        wind_dir: >
          {% set direction = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW', 'N'] %}
          {% set degree = state_attr('weather.forecast_home', 'wind_bearing') | float(0) %}
          {{ direction[((degree + 11.25) / 22.5) | int] }}
        wind_speed: >
          {% set sensor = state_attr('weather.forecast_home', 'wind_speed') | float(0) %}
          {{ (sensor / 3.6) | round(1) }}
        wind_desc: >
          {% set sensor = state_attr('weather.forecast_home', 'wind_speed') | float(0) %}
          {% if sensor >= 0 and sensor <= 0.99 %}
            Calm
          {% elif sensor >= 1 and sensor <= 6.99 %}
            Light air
          {% elif sensor >= 7 and sensor <= 11.99 %}
            Light breeze
          {% elif sensor >= 12 and sensor <= 19.99 %}
            Gentle breeze
          {% elif sensor >= 20 and sensor <= 29.99 %}
            Moderate breeze
          {% elif sensor >= 30 and sensor <= 39.99 %}
            Fresh breeze
          {% elif sensor >= 40 and sensor <= 50.99 %}
            Strong breeze
          {% elif sensor >= 51 and sensor <= 62.99 %}
            Near gale
          {% elif sensor >= 63 and sensor <= 75.99 %}
            Gale
          {% elif sensor >= 76 and sensor <= 87.99 %}
            Strong gale
          {% elif sensor >= 88 and sensor <= 102.99 %}
            Storm
          {% elif sensor >= 103 and sensor <= 117.99 %}
            Violent storm
          {% else %}
            Hurricane
          {% endif %}

#########################################
#                                       #
#         VÆR FORECAST V2               #
#                                       #
#########################################

- trigger:
    - platform: time_pattern
      minutes: /15
    - platform: homeassistant
      event: start
  action:
    - service: weather.get_forecasts
      target:
        entity_id: weather.forecast_home
      data:
        type: daily
      response_variable: daily_forecast
    - service: weather.get_forecasts
      target:
        entity_id: weather.forecast_home
      data:
        type: hourly
      response_variable: hourly_forecast
  sensor:
    - name: Weather Forecast V2
      unique_id: weather_forecast_combined_v2
      state: "{{ now().isoformat() }}"
      attributes:
        current: >
          {% set current = hourly_forecast['weather.forecast_home'].forecast[0] %}
          {% from 'weather_translate.jinja' import translate_condition %}
          {% set t = current.temperature | float(0) %}
          {% set k = (current.wind_speed | float(0)) / 3.6 %}
          {% set v = (k / 1000 * 60 * 60) %}
          {% set a = 13.12 + 0.6215 * t - 11.37 * (v ** 0.16) + 0.3965 * t * (v ** 0.16) %}
          {% set direction = ['N','NNØ','NØ','ØNØ','Ø','ØSØ','SØ','SSØ','S','SSV','SV','VSV','V','VNV','NV','NNV','N'] %}
          {% set degree = current.wind_bearing | float(0) %}
          {% from 'weather_wind.jinja' import get_wind_description %}
          {% set weather = current.condition %}
          {
            "condition": "{{ translate_condition(weather) | trim }}",
            "icon": "{% if is_state('sun.sun', 'above_horizon') %}{{ '/local/ic/weather_icons/met/' ~ weather ~ '.svg' }}{% else %}{{ '/local/ic/weather_icons/met/' ~ weather ~ '_night.svg' }}{% endif %}",
            "temperature": {{ current.temperature }},
            "wind_speed": {{ (current.wind_speed | float(0) / 3.6) | round(1) }},
            "wind_gust_speed": {{ current.wind_gust_speed | float(0) }},
            "wind_bearing": {{ current.wind_bearing | float(0) }},
            "wind_dir": "{{ direction[((degree + 11.25) / 22.5) | int] }}",
            "wind_desc": "{{ get_wind_description(current.wind_speed | float(0)) | trim | replace('\n', '') }}",
            "precipitation": {{ current.precipitation | float(0) }},
            "precipitation_probability": {{ current.precipitation_probability | int(0) }},
            "humidity": {{ current.humidity | int(0) }},
            "cloud_coverage": {{ current.cloud_coverage | int(0) }},
            "feels_like": {{ a | round(1) }}
            {% if current.uv_index is defined and current.uv_index is not none %},
            "uv_index": {{ current.uv_index }}
            {% endif %}
          }
        today: >
          {% set today = daily_forecast['weather.forecast_home'].forecast[0] %}
          {% from 'weather_translate.jinja' import translate_condition %}
          {% set t = today.temperature | float(0) %}
          {% set k = (today.wind_speed | float(0)) / 3.6 %}
          {% set v = (k / 1000 * 60 * 60) %}
          {% set a = 13.12 + 0.6215 * t - 11.37 * (v ** 0.16) + 0.3965 * t * (v ** 0.16) %}
          {% set direction = ['N','NNØ','NØ','ØNØ','Ø','ØSØ','SØ','SSØ','S','SSV','SV','VSV','V','VNV','NV','NNV','N'] %}
          {% set degree = today.wind_bearing | float(0) %}
          {% from 'weather_wind.jinja' import get_wind_description %}
          {% set weather = today.condition %}
          {
            "condition": "{{ translate_condition(weather) | trim }}",
            "icon": "{{ '/local/ic/weather_icons/met/' ~ weather ~ '.svg' }}",
            "temperature": {{ today.temperature }},
            "templow": {{ today.templow | float(0) }},
            "wind_speed": {{ (today.wind_speed | float(0) / 3.6) | round(1) }},
            "wind_gust_speed": {{ today.wind_gust_speed | float(0) }},
            "wind_bearing": {{ today.wind_bearing | float(0) }},
            "wind_dir": "{{ direction[((degree + 11.25) / 22.5) | int] }}",
            "wind_desc": "{{ get_wind_description(today.wind_speed | float(0)) | trim | replace('\n', '') }}",
            "precipitation": {{ today.precipitation | float(0) }},
            "precipitation_probability": {{ today.precipitation_probability | int(0) }},
            "humidity": {{ today.humidity | int(0) }},
            "feels_like": {{ a | round(1) }}
            {% if today.uv_index is defined and today.uv_index is not none %},
            "uv_index": {{ today.uv_index }}
            {% endif %}
          }
        forecast: >
          [
            {% for i in range(1, 6) %}
              {% if i < daily_forecast['weather.forecast_home'].forecast | length %}
                {% set day = daily_forecast['weather.forecast_home'].forecast[i] %}
                {% from 'weather_translate.jinja' import translate_condition %}
                {% from 'weather_wind.jinja' import get_wind_description %}
                {% set weather = day.condition %}
                {
                  "datetime": "{{ day.datetime }}",
                  "condition": "{{ translate_condition(weather) | trim }}",
                  "icon": "{{ '/local/ic/weather_icons/met/' ~ weather ~ '.svg' }}",
                  "temperature": {{ day.temperature | float(0) }}
                  {% if day.precipitation is defined and day.precipitation is not none %},
                  "precipitation": {{ day.precipitation }}
                  {% endif %}
                  {% if day.wind_speed is defined and day.wind_speed is not none %},
                  "wind_speed": {{ (day.wind_speed | float(0) / 3.6) | round(1) }},
                  "wind_desc": "{{ get_wind_description(day.wind_speed | float(0)) | trim | replace('\n', '') }}"
                  {% endif %}
                  {% if day.uv_index is defined and day.uv_index is not none %},
                  "uv_index": {{ day.uv_index }}
                  {% endif %}
                }{% if not loop.last %},{% endif %}
              {% endif %}
            {% endfor %}
          ]
        hourly: >
          [
            {% for i in range(1, hourly_forecast['weather.forecast_home'].forecast | length) %}
              {% set hour = hourly_forecast['weather.forecast_home'].forecast[i] %}
              {% set weather = hour.condition %}
              {% set hour_int = hour.datetime.split('T')[1].split(':')[0] | int %}
              {% set is_day = hour_int >= 6 and hour_int < 20 %}
              {
                "datetime": "{{ hour.datetime }}",
                "icon": "{% if is_day %}{{ '/local/ic/weather_icons/met/' ~ weather ~ '.svg' }}{% else %}{{ '/local/ic/weather_icons/met/' ~ weather ~ '_night.svg' }}{% endif %}",
                "temperature": {{ hour.temperature | float(0) }},
                "wind_speed": {{ (hour.wind_speed | float(0) / 3.6) | round(1) }}
                {% if hour.precipitation is defined and hour.precipitation is not none %},
                "precipitation": {{ hour.precipitation }}
                {% endif %}
              }{% if not loop.last %},{% endif %}
            {% endfor %}
          ]

