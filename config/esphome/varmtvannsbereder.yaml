#JSY energy meter protocol
uart:
  id: mod_bus
  tx_pin: 17
  rx_pin: 16
  baud_rate: 4800
  stop_bits: 1

modbus:
  id: modbus1

modbus_controller:
  - id: jsymk
    #modbus device address
    address: 0x1
    modbus_id: modbus1
    update_interval: 12s
    command_throttle: 50ms





binary_sensor:
# Connection status
  - platform: status
    name: "Status"
    id: connection_status

sensor:
  - platform: modbus_controller
    modbus_controller_id: jsymk
    id: voltage1
    name: "Spenning"
    icon: mdi:alpha-v-box
    device_class: energy
    address: 0x0048
    unit_of_measurement: "V"
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.0001
    register_count: 1
    response_size: 4

# First channel current
  - platform: modbus_controller
    modbus_controller_id: jsymk
    id: current1
    name: "Strøm 1"
    icon: mdi:current-ac
    device_class: energy
    address: 0x0049
    unit_of_measurement: "A"
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.0001
    register_count: 1
    response_size: 4

# First channel power
  - platform: modbus_controller
    modbus_controller_id: jsymk
    id: power1
    name: "Effekt 1"
    icon: mdi:lightning-bolt
    device_class: energy
    address: 0x004A
    unit_of_measurement: "W"
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.0001
    register_count: 1
    response_size: 4

# First channel energy
  - platform: modbus_controller
    modbus_controller_id: jsymk
    id: energy1
    name: "Energi 1"
    icon: mdi:lightning-bolt
    device_class: energy
    address: 0x004B
    unit_of_measurement: "kWh"
    state_class: total
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.0001
    register_count: 1
    response_size: 4




# Second channel voltage
