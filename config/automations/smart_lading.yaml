###############################################################################
# Smart EV-lading basert på Norgespris
#
# Styrer Tesla-lading automatisk basert på strømpris.
# Krever at input_boolean.tibber_stromstyring er slått på.
# Lader når prisen er under input_number.smart_lading_maks_pris (kr/kWh).
###############################################################################

- id: smart_lading_pris_check
  alias: "Smart lading — sjekk pris og start/stopp lading"
  description: >
    Kjører hvert 5. minutt og ved prisendring eller toggle-endring.
    Starter Tesla-lading når Norgespris < maks-pris-terskel,
    stopper lading når prisen overstiger terskelen.
  trigger:
    - trigger: time_pattern
      minutes: "/5"
    - trigger: state
      entity_id: input_boolean.tibber_stromstyring
    - trigger: state
      entity_id: sensor.norgespris_pris_na
    - trigger: state
      entity_id: input_number.smart_lading_maks_pris
  condition:
    - condition: state
      entity_id: input_boolean.tibber_stromstyring
      state: "on"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('sensor.norgespris_pris_na') | float(99) <=
                   states('input_number.smart_lading_maks_pris') | float(1.0) }}
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.tesla_model_y_batteri_lading
        - conditions:
            - condition: template
              value_template: >
                {{ states('sensor.norgespris_pris_na') | float(0) >
                   states('input_number.smart_lading_maks_pris') | float(1.0) }}
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.tesla_model_y_batteri_lading
  mode: single

- id: smart_lading_stopp_ved_deaktivering
  alias: "Smart lading — stopp lading når toggle slås av"
  description: >
    Slår av automatisk lading og varsler når smart lading deaktiveres.
  trigger:
    - trigger: state
      entity_id: input_boolean.tibber_stromstyring
      to: "off"
  action:
    - action: switch.turn_off
      target:
        entity_id: switch.tesla_model_y_batteri_lading
  mode: single
