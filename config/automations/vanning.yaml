# Vanning — planlagte automatiseringer
# Kjør ved planlagt tid hvis dagen er aktivert og regnskjerm-betingelsen er oppfylt.
# Regnskjerm: hopper over vanning hvis prognostisert nedbør (neste 6t) >= terskel.

- id: vanning_kjokken_planlagt
  alias: "Vanning: Kjøkken planlagt"
  description: Åpner kjøkkenventilen på planlagt tid
  trigger:
    - trigger: time
      at: input_datetime.vanning_kjokken_starttid
  condition:
    - condition: state
      entity_id: input_boolean.vanning_aktivert
      state: "on"
    - condition: template
      value_template: >
        {% set weekday = now().weekday() %}
        {% set days = [
          'input_boolean.vanning_kjokken_man',
          'input_boolean.vanning_kjokken_tir',
          'input_boolean.vanning_kjokken_ons',
          'input_boolean.vanning_kjokken_tor',
          'input_boolean.vanning_kjokken_fre',
          'input_boolean.vanning_kjokken_lor',
          'input_boolean.vanning_kjokken_son'
        ] %}
        {{ is_state(days[weekday], 'on') }}
    - condition: template
      value_template: >
        {% if is_state('input_boolean.vanning_regnskjerm', 'on') %}
          {{ (states('sensor.vaervarsel_regn_neste_6_timer') | float(0))
             < (states('input_number.vanning_regn_terskel') | float(2)) }}
        {% else %}
          true
        {% endif %}
  action:
    - action: script.vanning_start
      data:
        ventil: valve.kjokken_vannventil_aktivert
        timer: timer.vanning_kjokken
        varighet: "{{ states('input_number.vanning_kjokken_varighet') | int(10) }}"
  mode: single

