# Sikkerhet: lukk ventiler hvis timer kanselleres (f.eks. HA restart)
- id: vanning_timer_ferdig_kjokken
  alias: "Vanning: Lukk Kjøkken ved timer ferdig/kansellert"
  trigger:
    - trigger: event
      event_type: timer.finished
      event_data:
        entity_id: timer.vanning_kjokken
    - trigger: event
      event_type: timer.cancelled
      event_data:
        entity_id: timer.vanning_kjokken
  action:
    - action: valve.close_valve
      target:
        entity_id: valve.kjokken_vannventil_aktivert
  mode: single

