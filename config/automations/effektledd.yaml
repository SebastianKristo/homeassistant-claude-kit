###############################################################################
# Effektledd — Elvia fastledd tracking
#
# Elvia beregner fastledd basert på gjennomsnittet av de 3 høyeste
# timegjennomsnitts-effektene i måneden (kW per time).
#
# sensor.strommaler_powercalc_energy_hourly = kWh brukt inneværende time.
# Siden utility_meter resetter hvert hele time er verdien ved time 59 ≈
# gjennomsnittlig kW for den timen.
###############################################################################

- id: 'effektledd_oppdater_topp'
  alias: Effektledd - Oppdater timetopp
  description: >
    Lagrer de 3 høyeste timegjennomsnitts-effektene (kW) for måneden i
    input_number.effekt_topp_1/2/3. Kjøres ved 59 min hvert time.
  triggers:
    - trigger: time_pattern
      minutes: "59"
  conditions: []
  actions:
    - variables:
        cur: "{{ states('sensor.strommaler_powercalc_energy_hourly') | float(0) }}"
        t1: "{{ states('input_number.effekt_topp_1') | float(0) }}"
        t2: "{{ states('input_number.effekt_topp_2') | float(0) }}"
        t3: "{{ states('input_number.effekt_topp_3') | float(0) }}"
    - condition: template
      value_template: "{{ cur > [t1, t2, t3] | min }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ t1 <= t2 and t1 <= t3 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.effekt_topp_1
              data:
                value: "{{ cur | round(2) }}"
        - conditions:
            - condition: template
              value_template: "{{ t2 <= t1 and t2 <= t3 }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.effekt_topp_2
              data:
                value: "{{ cur | round(2) }}"
      default:
        - action: input_number.set_value
          target:
            entity_id: input_number.effekt_topp_3
          data:
            value: "{{ cur | round(2) }}"

- id: 'effektledd_nullstill_maned'
  alias: Effektledd - Lagre og nullstill ved månedsskifte
  description: >
    Lagrer forrige måneds fastledd-kostnad til riktig input_number,
    nullstiller deretter de 3 effekttoppene slik at ny måned starter fra 0.
    Kjøres 1. i måneden kl. 00:00:30.
  triggers:
    - trigger: time
      at: "00:00:30"
  conditions:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  actions:
    # Lagre forrige måneds kostnad
    - variables:
        months: "['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember']"
        prev_month_entity: >
          {% set months = ['januar','februar','mars','april','mai','juni',
                           'juli','august','september','oktober','november','desember'] %}
          input_number.fastledd_{{ months[(now().month - 2) % 12] }}
        cost: "{{ states('sensor.effektledd_kostnad') | float(0) | round(0) | int }}"
    - action: input_number.set_value
      target:
        entity_id: "{{ prev_month_entity }}"
      data:
        value: "{{ cost }}"
    # Nullstill toppene for ny måned
    - action: input_number.set_value
      target:
        entity_id: input_number.effekt_topp_1
      data:
        value: 0
    - action: input_number.set_value
      target:
        entity_id: input_number.effekt_topp_2
      data:
        value: 0
    - action: input_number.set_value
      target:
        entity_id: input_number.effekt_topp_3
      data:
        value: 0
