#########################################
#                                       #
#         VANNMÅLER FLYT                #
#                                       #
#########################################

# Beregner øyeblikkelig vannforbruk i L/min basert på endring i total volum.
# Brukes av sensor.vann_aktivitet_kategori i templates.yaml.

- platform: derivative
  name: "Vann flyt"
  source: sensor.vannmaler_total_volume
  unit_time: min
  time_window: "00:02:00"
  round: 1

#########################################

- platform: history_stats
  name: "TV Seertid I Dag"
  unique_id: "tv_seertid_i_dag"
  entity_id: media_player.stue_tv
  state: "playing"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: "TV Seertid Denne Uka"
  unique_id: "tv_seertid_uka"
  entity_id: media_player.stue_tv
  state: "playing"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=now().weekday()) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: "TV Seertid Denne Måned"
  unique_id: "tv_seertid_maned"
  entity_id: media_player.stue_tv
  state: "playing"
  type: time
  start: "{{ now().replace(day=1, hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"
