#              Dato og tid              #
#                                       #
#########################################

- platform: time_date
  display_options:
    - "time"
    - "date"
    - "date_time"
    - "date_time_utc"
    - "date_time_iso"
    - "time_date"
    - "time_utc"

#########################################
#                                       #
#              Søppel                   #
#                                       #
#########################################

- platform: rest
  name: PostenDeliveryDays
  resource: https://www.posten.no/levering-av-post/_/component/main/1/leftRegion/1?postCode=2850
  headers:
    x-requested-with: XMLHttpRequest
  scan_interval: 57600
  value_template: "{{ value_json.nextDeliveryDays }}"

#########################################
#                                       #
#              Transport                #
#                                       #
#########################################

#########################################
#                                       #
#              L Y N                    #
#                                       #
#########################################

- platform: rest
  name: Latest Lightning Strike Area
  resource_template: >-
    https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat={{ states('sensor.latest_lightning_strike_latitude') }}&lon={{ states('sensor.latest_lightning_strike_longitude') }}
  headers:
    User-Agent: HomeAssistant/1.0
  value_template: >
    {{ value_json.address.suburb
        or value_json.address.city
        or value_json.address.town
        or value_json.address.village
        or value_json.address.state
        or value_json.display_name }}
  scan_interval: 3600

