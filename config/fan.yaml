- platform: template
  fans:
    stavifte:
      friendly_name: "Gulvvifte"
      unique_id: "gulvvifte"
      value_template: >
        {{ is_state('switch.gulvvifte_fan_gulvvifte_relay1', 'on') or
           is_state('switch.gulvvifte_fan_gulvvifte_relay2', 'on') or
           is_state('switch.gulvvifte_fan_gulvvifte_relay3', 'on') }}
      percentage_template: >
        {% if is_state('switch.gulvvifte_fan_gulvvifte_relay1', 'on') %}
          33
        {% elif is_state('switch.gulvvifte_fan_gulvvifte_relay2', 'on') %}
          66
        {% elif is_state('switch.gulvvifte_fan_gulvvifte_relay3', 'on') %}
          100
        {% else %}
          0
        {% endif %}
      set_percentage:
        - service: homeassistant.turn_off
          target:
            entity_id:
              - switch.gulvvifte_fan_gulvvifte_relay1
              - switch.gulvvifte_fan_gulvvifte_relay2
              - switch.gulvvifte_fan_gulvvifte_relay3
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ percentage <= 33 }}"
              sequence:
                - service: switch.turn_on
                  target:
                    entity_id: switch.gulvvifte_fan_gulvvifte_relay1
            - conditions:
                - condition: template
                  value_template: "{{ percentage > 33 and percentage <= 66 }}"
              sequence:
                - service: switch.turn_on
                  target:
                    entity_id: switch.gulvvifte_fan_gulvvifte_relay2
            - conditions:
                - condition: template
                  value_template: "{{ percentage > 66 }}"
              sequence:
                - service: switch.turn_on
                  target:
                    entity_id: switch.gulvvifte_fan_gulvvifte_relay3
      turn_on:
        service: switch.turn_on
        target:
          entity_id: switch.stavifte_smart_fan_st_vifte_smart_relay1
      turn_off:
        service: homeassistant.turn_off
        target:
          entity_id:
            - switch.gulvvifte_fan_gulvvifte_relay1
            - switch.gulvvifte_fan_gulvvifte_relay2
            - switch.gulvvifte_fan_gulvvifte_relay3
      oscillating_template: >
        {{ is_state('switch.gulvvifte_fan_gulvvifte_relay4', 'on') }}
      set_oscillating:
        service: >
          {% if oscillating %}
            switch.turn_on
          {% else %}
            switch.turn_off
          {% endif %}
        target:
          entity_id: switch.gulvvifte_fan_gulvvifte_relay4